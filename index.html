<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜大會雲端指揮官中樞</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root {
            --color-bg: #F8FAFC;
            --color-primary: #5483B3;
            --color-darkblue: #052659;
            --color-light: #C1E8FF;
        }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: var(--color-bg); color: #1e293b; }
        
        [contenteditable="true"] { 
            white-space: pre-wrap !important; 
            word-break: break-word !important;
        }
        
        .sync-pre-wrap { white-space: pre-wrap !important; }
        [contenteditable="true"]:focus { outline: 2px solid var(--color-primary); background-color: #ffffff; box-shadow: 0 0 0 4px rgba(84, 131, 179, 0.15); border-radius: 6px; }
        .card-shadow { box-shadow: 0 4px 18px -4px rgba(5, 38, 89, 0.05), 0 2px 6px -1px rgba(5, 38, 89, 0.03); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            storageBucket: "test-fee8d.firebasestorage.app",
            messagingSenderId: "415299571304",
            appId: "1:415299571304:web:391ce6ecb4d8e2f19035dd",
            measurementId: "G-EL7VKT97L4",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const dataRef = ref(db, 'ts_2026_realtime_data');
            window.cloudDb = db;

            window.cloudSaveEngine = function(data) {
                set(dataRef, data).catch(e => console.log("雲端同步失敗：", e));
            };

            window.cloudUpdateCell = function(path, value) {
                const cellRef = ref(window.cloudDb, `ts_2026_realtime_data/${path}`);
                set(cellRef, value).catch(e => console.log("局部更新失敗：", e));
            };

            onValue(dataRef, (snapshot) => {
                const cloudData = snapshot.val();
                const statusBadge = document.getElementById('cloud-status-badge');
                
                if (cloudData) {
                    const activeId = document.activeElement ? document.activeElement.id : null;
                    window.appData = cloudData;
                    window.renderSidebarMenu();
                    window.renderActivePanelOnly();

                    if (activeId) {
                        const el = document.getElementById(activeId);
                        if (el && document.activeElement !== el) {
                            el.focus();
                        }
                    }
                    statusBadge.className = "text-xs text-emerald-600 bg-emerald-50 border border-emerald-100 px-4 py-2 rounded-full font-medium shadow-inner flex items-center gap-1.5 shrink-0";
                    statusBadge.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> 雲端協作・即時防衝突監聽中`;
                } else {
                    window.cloudSaveEngine(window.appData);
                }
            });

        } catch (e) {
            console.error("Firebase 初始化失敗", e);
        }
    </script>

    <header class="border-b border-slate-200 bg-white/90 backdrop-blur-md sticky top-0 z-50 px-4 lg:px-8 py-4 flex flex-col sm:flex-row gap-4 justify-between items-center shadow-sm">
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <div class="w-10 h-10 bg-gradient-to-tr from-[#5483B3] to-[#C1E8FF] rounded-xl flex items-center justify-center shadow-md shadow-[#5483B3]/20 shrink-0">
                <svg viewBox="0 0 24 24" class="w-6 h-6 text-white fill-current" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2,12C2,12 5,3 12,3C16,3 22,6 22,12C22,15 18,20 12,20C8,20 5,17 4,15C5.5,15.5 7.5,15 9,14C6,13 4.5,10.5 4.5,8.5C5.5,9.5 7,10 8,9.5C5,8 4.5,5 5.5,4C6.5,6.5 9,9 13,9.5C12,8 12.5,6 14,4.5C16,3 18.5,4 19.5,5.5C18.5,5 17,5 16,5.5C17,6.5 17.5,8 17,9.5C18.5,9 20,7.5 20.5,6.5C20,8.5 18.5,10 17,11C19,11 20.5,10.5 21,10C20.5,12 18.5,13.5 16.5,14C18,15.5 19,17.5 18.5,19.5C16,18 14,15.5 13,14C10,15 6,15 2,12Z"/>
                </svg>
            </div>
            <div>
                <h1 class="text-base font-bold tracking-tight text-[#052659]">TS 2026 年度盛會智慧中樞</h1>
                <p class="text-[9px] uppercase font-bold tracking-widest text-slate-400">⚡ 多人同框不衝突協作系統</p>
            </div>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto justify-end">
            <button onclick="exportAllData()" class="text-slate-400 hover:text-slate-600 p-2 text-xs" title="導出備份 JSON">
                <i class="fa-solid fa-download"></i> 備份導出
            </button>
            <span id="cloud-status-badge" class="text-xs text-amber-600 bg-amber-50 border border-amber-100 px-4 py-2 rounded-full font-medium shadow-inner flex items-center gap-1.5 shrink-0">
                <span class="w-2 h-2 rounded-full bg-amber-500"></span> 正在建立防衝突連線...
            </span>
        </div>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row">
        <aside class="w-full lg:w-64 border-b lg:border-b-0 lg:border-r border-slate-200 bg-white p-4 flex flex-col justify-between select-none">
            <div class="flex flex-row lg:flex-col gap-1.5 overflow-x-auto lg:overflow-x-visible no-scrollbar pb-1 lg:pb-0" id="sidebar-menu"></div>
            <button onclick="createNewPanelPrompt()" class="hidden lg:flex w-full bg-slate-50 border border-slate-200 text-[#5483B3] text-xs font-medium py-2.5 rounded-xl transition-all items-center justify-center gap-2 mt-4">
                <i class="fa-solid fa-folder-plus"></i> 新增主控分組
            </button>
        </aside>

        <main class="flex-1 p-4 lg:p-8 bg-[#F8FAFC]">
            
            <div id="panel-timeline" class="main-panel hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-base font-bold text-[#052659] flex items-center gap-2"><i class="fa-solid fa-list-timeline text-[#5483B3]"></i> 大會核心時程主骨架</h2>
                    <button onclick="addNewTimelineRow()" class="bg-[#5483B3] text-white text-xs font-semibold px-4 py-2 rounded-xl shadow-sm">＋ 新增時段</button>
                </div>

                <div class="hidden lg:block bg-white border border-slate-200 rounded-2xl overflow-hidden card-shadow">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/70 border-b border-slate-200 text-xs font-semibold text-slate-500">
                                <th class="p-4 w-24 text-center">調整排序</th>
                                <th class="p-4 w-12 text-center">序</th>
                                <th class="p-4 w-32">時間段</th>
                                <th class="p-4 w-44">核心節目模組</th>
                                <th class="p-4 w-64">內容與舞台設定 (T台運用)</th>
                                <th class="p-4 w-44">器材清單</th>
                                <th class="p-4 w-44">PA / 音控</th>
                                <th class="p-4 w-44">攝影 / 畫面</th>
                                <th class="p-4 w-44">備註</th>
                                <th class="p-4 w-12 text-center">刪</th>
                            </tr>
                        </thead>
                        <tbody id="timeline-desktop-tbody" class="divide-y divide-slate-100 text-xs"></tbody>
                    </table>
                </div>
                <div class="block lg:hidden space-y-4" id="timeline-mobile-container"></div>
            </div>

            <div id="panel-checklist" class="main-panel hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-base font-bold text-[#052659] flex items-center gap-2"><i class="fa-solid fa-shield-heart text-[#5483B3]"></i> 大會物資防線檢核</h2>
                    <button onclick="addNewChecklistItem()" class="bg-[#5483B3] text-white text-xs px-3 py-1.5 rounded-xl">＋ 新增項目</button>
                </div>
                <div class="bg-white border border-slate-200 rounded-xl divide-y divide-slate-100 card-shadow" id="checklist-box"></div>
            </div>

            <div id="panel-team-generic" class="main-panel hidden">
                <div class="bg-white border border-slate-200 rounded-2xl p-5 card-shadow mb-6">
                    <h2 class="text-lg font-bold text-[#052659]" id="team-title-display">小組盤</h2>
                    <div class="mt-4">
                        <label class="text-xs font-bold text-slate-400 block mb-2">👥 本組作戰組員名單 (直接打字換行，全台秒同步)</label>
                        <div id="team-members-box" contenteditable="true" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs text-slate-700 focus:outline-none min-h-[50px] leading-relaxed"></div>
                    </div>
                </div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">📦 本組專屬功能戰術模塊</h3>
                    <button onclick="addNewModuleToTeam()" class="text-xs font-semibold text-[#5483B3] hover:text-[#052659]">＋ 新增工作塊</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="team-modules-grid"></div>
                <button onclick="deleteCurrentCustomPanel()" id="btn-delete-panel" class="mt-8 text-rose-500 hover:text-rose-700 text-xs font-medium flex items-center gap-1"><i class="fa-solid fa-trash-can"></i> 刪除此自訂分組</button>
            </div>

        </main>
    </div>

    <script>
        const fallbackTimeline = [{ time: "09:00 - 12:00", module: "前置與彩排", stage: "測試流程", equip: "", pa: "", photo: "", note: "" }];
        
        // 🔴 ⚡ 徹底移除舊有的重複初始化結構，給予每組完全獨立乾淨的初始狀態
        const defaultPanels = [
            { id: "timeline", name: "大會主細流", icon: "fa-clock-history", type: "system" },
            { id: "checklist", name: "物資防線檢核", icon: "fa-list-check", type: "system" },
            { id: "team_activity", name: "活動組工作盤", icon: "fa-users-gear", type: "team", members: "Owen (組長)", modules: [] },
            { id: "team_admin", name: "行政組工作盤", icon: "fa-folder-open", type: "team", members: "恩安 (組長)", modules: [] },
            { id: "team_design", name: "設計組工作盤", icon: "fa-palette", type: "team", members: "宇哲 (組長)", modules: [] },
            { id: "team_game", name: "遊戲組工作盤", icon: "fa-dice", type: "team", members: "柏任 (組長)", modules: [] },
            { id: "team_mkt", name: "行銷組工作盤", icon: "fa-bullhorn", type: "team", members: "行銷夥伴", modules: [] }
        ];

        window.appData = { timeline: fallbackTimeline, checklist: [], panels: defaultPanels, currentTab: "timeline" };

        window.refreshActivePanel = function() {
            window.renderSidebarMenu();
            window.renderActivePanelOnly();
        }

        window.renderActivePanelOnly = function() {
            // 先強行把所有人藏起來，徹底清空殘留畫面
            document.querySelectorAll('.main-panel').forEach(p => p.classList.add('hidden'));
            const tabId = window.appData.currentTab || "timeline";
            
            if(tabId === 'timeline') {
                document.getElementById('panel-timeline').classList.remove('hidden');
                renderTimelineTable();
            } else if(tabId === 'checklist') {
                document.getElementById('panel-checklist').classList.remove('hidden');
                renderChecklist();
            } else {
                const panelData = window.appData.panels.find(p => p.id === tabId);
                if(panelData) {
                    document.getElementById('panel-team-generic').classList.remove('hidden');
                    document.getElementById('team-title-display').innerText = panelData.name;
                    
                    const membersBox = document.getElementById('team-members-box');
                    // 🔴 修正：當切換分頁時，如果不是當前輸入焦點，強制用後台真實數據刷新，解決「卡在舊畫面」
                    if (document.activeElement !== membersBox) {
                        membersBox.innerText = panelData.members || "點擊輸入組員...";
                    }
                    membersBox.onblur = function() { window.updateTeamMembersData(panelData.id, this.innerText); };

                    const sysIds = ['team_activity', 'team_admin', 'team_design', 'team_game', 'team_mkt'];
                    document.getElementById('btn-delete-panel').style.display = sysIds.includes(panelData.id) ? 'none' : 'block';
                    renderTeamModules(panelData);
                }
            }
        }

        window.renderSidebarMenu = function() {
            const menu = document.getElementById('sidebar-menu');
            menu.innerHTML = `<p class="hidden lg:block text-[11px] font-bold uppercase tracking-wider text-slate-400 px-3 mb-2">大會總指揮面版</p>`;
            window.appData.panels.forEach(p => {
                const isActive = window.appData.currentTab === p.id;
                let activeStyle = isActive ? `bg-[#5483B3]/10 text-[#5483B3] border-[#5483B3]/30 font-bold shadow-sm shrink-0 lg:shrink` : `text-slate-500 hover:bg-slate-50 border-transparent shrink-0 lg:shrink`;
                menu.innerHTML += `<button onclick="switchTab('${p.id}')" class="text-left px-4 py-2.5 rounded-xl border text-xs transition-all flex items-center gap-2 ${activeStyle}"><i class="fa-solid ${p.icon} w-4 text-center"></i><span class="whitespace-nowrap">${p.name}</span></button>`;
            });
        }

        window.switchTab = function(tabId) {
            window.appData.currentTab = tabId;
            localStorage.setItem('ts_v3_current_tab', tabId);
            window.renderSidebarMenu();
            window.renderActivePanelOnly(); // 觸發清空重繪
        }

        window.renderTimelineTable = function() {
            const desktopTbody = document.getElementById('timeline-desktop-tbody');
            if(!desktopTbody) return;
            desktopTbody.innerHTML = window.appData.timeline.map((row, idx) => {
                const fields = ['time', 'module', 'stage', 'equip', 'pa', 'photo', 'note'];
                const tdElements = fields.map(f => {
                    const cellId = `cell-timeline-${idx}-${f}`;
                    if (document.activeElement && document.activeElement.id === cellId) {
                        return `<td class="p-4" id="${cellId}" contenteditable="true">${document.activeElement.innerText}</td>`;
                    }
                    let textStyle = f === 'time' ? 'font-mono font-bold text-[#5483B3]' : (f === 'module' ? 'font-bold text-slate-800' : 'text-slate-600');
                    if (f === 'pa') textStyle = 'text-[#5483B3] font-medium';
                    return `<td class="p-4 ${textStyle} sync-pre-wrap" id="${cellId}" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, '${f}', this.innerText)">${row[f] || ''}</td>`;
                }).join('');

                return `<tr>
                    <td class="p-3 text-center space-x-1 select-none">
                        <button onclick="moveTimelineRow(${idx}, -1)" class="bg-slate-100 hover:bg-[#5483B3]/20 text-[#5483B3] w-7 h-7 rounded-lg"><i class="fa-solid fa-arrow-up text-[11px]"></i></button>
                        <button onclick="moveTimelineRow(${idx}, 1)" class="bg-slate-100 hover:bg-[#5483B3]/20 text-[#5483B3] w-7 h-7 rounded-lg"><i class="fa-solid fa-arrow-down text-[11px]"></i></button>
                    </td>
                    <td class="p-4 text-center font-bold text-slate-400 bg-slate-50/40">${idx + 1}</td>
                    ${tdElements}
                    <td class="p-4 text-center"><button onclick="deleteTimelineRow(${idx})" class="text-slate-300 hover:text-rose-500 p-1"><i class="fa-solid fa-trash-can"></i></button></td>
                </tr>`;
            }).join('');

            const mobileContainer = document.getElementById('timeline-mobile-container');
            if(!mobileContainer) return;
            mobileContainer.innerHTML = window.appData.timeline.map((row, idx) => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm space-y-3 relative">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-2">
                        <div class="flex items-center gap-2">
                            <span class="bg-[#052659] text-white w-5 h-5 rounded-md flex items-center justify-center text-[10px] font-bold">${idx + 1}</span>
                            <div>
                                <span class="text-xs font-mono font-bold text-[#5483B3] block" id="m-cell-${idx}-time" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'time', this.innerText)">${row.time}</span>
                                <h3 class="text-sm font-bold text-slate-800 mt-0.5" id="m-cell-${idx}-module" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'module', this.innerText)">${row.module}</h3>
                            </div>
                        </div>
                        <div class="flex items-center gap-1.5 select-none">
                            <button onclick="moveTimelineRow(${idx}, -1)" class="bg-slate-50 p-1 px-2 rounded border border-slate-200 text-[#5483B3] text-xs"><i class="fa-solid fa-arrow-up"></i></button>
                            <button onclick="moveTimelineRow(${idx}, 1)" class="bg-slate-50 p-1 px-2 rounded border border-slate-200 text-[#5483B3] text-xs"><i class="fa-solid fa-arrow-down"></i></button>
                            <button onclick="deleteTimelineRow(${idx})" class="text-slate-300 hover:text-rose-500 text-xs ml-1"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                    <div class="text-xs text-slate-600">
                        <span class="font-bold text-slate-400 block text-[10px] uppercase tracking-wider mb-1">🎬 內容與動線設定：</span>
                        <p class="focus:bg-slate-50 p-1 rounded sync-pre-wrap" id="m-cell-${idx}-stage" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'stage', this.innerText)">${row.stage}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-50 text-[11px]">
                        <div class="bg-slate-50 p-2 rounded-xl">
                            <span class="font-bold text-slate-400 block text-[9px] uppercase mb-0.5">🛠 器材清單：</span>
                            <span class="text-slate-700 block min-h-[15px] sync-pre-wrap" id="m-cell-${idx}-equip" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'equip', this.innerText)">${row.equip || ''}</span>
                        </div>
                        <div class="bg-blue-50/60 p-2 rounded-xl">
                            <span class="font-bold text-[#5483B3] block text-[9px] uppercase mb-0.5">🎵 PA / 音控：</span>
                            <span class="text-[#5483B3] font-medium block min-h-[15px] sync-pre-wrap" id="m-cell-${idx}-pa" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'pa', this.innerText)">${row.pa || ''}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.updateTimelineCellData = function(index, field, value) {
            window.appData.timeline[index][field] = value;
            if (window.cloudUpdateCell) { window.cloudUpdateCell(`timeline/${index}/${field}`, value); }
        }

        window.updateTeamMembersData = function(panelId, value) {
            const pIdx = window.appData.panels.findIndex(p => p.id === panelId);
            if (pIdx !== -1) {
                window.appData.panels[pIdx].members = value;
                if (window.cloudUpdateCell) { window.cloudUpdateCell(`panels/${pIdx}/members`, value); }
            }
        }

        window.updateModuleCellData = function(panelId, mIdx, field, value) {
            const pIdx = window.appData.panels.findIndex(p => p.id === panelId);
            if (pIdx !== -1) {
                window.appData.panels[pIdx].modules[mIdx][field] = value;
                if (window.cloudUpdateCell) { window.cloudUpdateCell(`panels/${pIdx}/modules/${mIdx}/${field}`, value); }
            }
        }

        window.moveTimelineRow = function(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= window.appData.timeline.length) return;
            const temp = window.appData.timeline[index];
            window.appData.timeline[index] = window.appData.timeline[targetIndex];
            window.appData.timeline[targetIndex] = temp;
            if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData);
        }

        window.addNewTimelineRow = function() { 
            window.appData.timeline.push({ time: "時段", module: "新項目", stage: "編輯設定...", equip: "", pa: "", photo: "", note: "" }); 
            if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData); 
        }
        
        window.deleteTimelineRow = function(index) { 
            if(confirm("確定刪除此段時程？")) { 
                window.appData.timeline.splice(index, 1); 
                if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData); 
            } 
        }

        // 🔴 ⚡ 核心優化：給予每個任務方塊絕對獨一無二的動態隨機 ID，永久清除卡死 Bug
        window.renderTeamModules = function(panel) {
            const grid = document.getElementById('team-modules-grid');
            if(!grid) return;
            if(!panel.modules) panel.modules = [];
            
            grid.innerHTML = panel.modules.map((mod, mIdx) => {
                // 使用唯一的動態識別符，防止跨分頁串音
                const titleId = `mod-title-${panel.id}-${mIdx}`;
                const contentId = `mod-content-${panel.id}-${mIdx}`;
                
                return `<div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm relative group card-shadow">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="text-xs font-bold text-[#052659]" id="${titleId}" contenteditable="true" onblur="window.updateModuleCellData('${panel.id}', ${mIdx}, 'title', this.innerText)">${mod.title}</h4>
                        <button onclick="window.deleteModuleFromTeam('${panel.id}', ${mIdx})" class="text-rose-500 hover:text-rose-700 transition-colors text-xs p-1">
                            <i class="fa-solid fa-circle-xmark text-sm"></i>
                        </button>
                    </div>
                    <div class="text-xs text-slate-500 leading-relaxed bg-slate-50 p-2 rounded-lg min-h-[50px] sync-pre-wrap" id="${contentId}" contenteditable="true" onblur="window.updateModuleCellData('${panel.id}', ${mIdx}, 'content', this.innerText)">${mod.content}</div>
                </div>`;
            }).join('');
        }

        window.addNewModuleToTeam = function() {
            const panel = window.appData.panels.find(p => p.id === window.appData.currentTab);
            if(panel) { 
                if(!panel.modules) panel.modules = [];
                panel.modules.push({ title: "新自訂任務塊", content: "點擊編輯內容..." }); 
                if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData);
            }
        }
        window.deleteModuleFromTeam = function(panelId, mIdx) {
            const panel = window.appData.panels.find(p => p.id === panelId);
            if(panel && confirm("確定刪除此工作塊？")) {
                panel.modules.splice(mIdx, 1);
                if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData);
            }
        }
        window.createNewPanelPrompt = function() {
            const name = prompt("請輸入全新協作組別名稱："); if(!name) return;
            const id = "team_" + Date.now();
            window.appData.panels.push({ id, name: name+"工作盤", icon: "fa-users-rectangle", type: "team", members: "編輯組員...", modules: [] });
            if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData);
            switchTab(id);
        }
        window.deleteCurrentCustomPanel = function() {
            if(confirm("確定刪除此分組？")) { window.appData.panels = window.appData.panels.filter(p => p.id !== window.appData.currentTab); window.appData.currentTab = "timeline"; if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData); switchTab("timeline"); }
        }

        window.renderChecklist = function() {
            const box = document.getElementById('checklist-box');
            if(!box) return;
            box.innerHTML = window.appData.checklist.map((item, idx) => `
                <div class="flex items-center p-4 gap-4 ${item.done ? 'bg-slate-50 opacity-50' : ''}">
                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="window.toggleCheckItem(${idx})" class="w-4 h-4 rounded border-slate-300 text-[#5483B3] focus:ring-0">
                    <div class="flex-1 text-xs font-bold text-slate-800 ${item.done ? 'line-through text-slate-400' : ''} sync-pre-wrap" contenteditable="true" onblur="window.updateCheckCellData(${idx}, 'item', this.innerText)">${item.item}</div>
                    <span class="bg-blue-50 text-[#5483B3] text-[10px] px-2 py-0.5 rounded border border-[#5483B3]/20" contenteditable="true" onblur="updateCheckCellData(${idx}, 'team', this.innerText)">${item.team}</span>
                    <div class="flex-1 text-xs text-slate-400 hidden sm:block sync-pre-wrap" contenteditable="true" onblur="updateCheckCellData(${idx}, 'note', this.innerText)">${item.note}</div>
                    <button onclick="deleteCheckItem(${idx})" class="text-slate-300 hover:text-rose-500 text-xs"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }
        window.toggleCheckItem = function(idx) { window.appData.checklist[idx].done = !window.appData.checklist[idx].done; if (window.cloudUpdateCell) window.cloudUpdateCell(`checklist/${idx}/done`, window.appData.checklist[idx].done); }
        window.updateCheckCellData = function(idx, field, val) { window.appData.checklist[idx][field] = val; if (window.cloudUpdateCell) window.cloudUpdateCell(`checklist/${idx}/${field}`, val); }
        window.addNewChecklistItem = function() { window.appData.checklist.push({ id: Date.now(), done: false, item: "新物資項目", team: "主控組", note: "點擊修改..." }); if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData); }
        window.deleteCheckItem = function(idx) { window.appData.checklist.splice(idx, 1); if (window.cloudSaveEngine) window.cloudSaveEngine(window.appData); }

        window.exportAllData = function() {
            const blob = new Blob([JSON.stringify(window.appData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "2026_TS_年度盛會_完美防卡死版.json"; a.click();
        }

        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem('ts_v3_current_tab')) window.appData.currentTab = localStorage.getItem('ts_v3_current_tab');
            window.refreshActivePanel();
        });
    </script>
</body>
</html>
