<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜大會雲端指揮官中樞</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1e293b; }
        [contenteditable="true"] { white-space: pre-wrap !important; word-break: break-word !important; }
        [contenteditable="true"]:focus { outline: 2px solid #5483B3; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(84, 131, 179, 0.15); border-radius: 6px; }
        .card-shadow { box-shadow: 0 4px 18px -4px rgba(5, 38, 89, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

    <div id="auth-overlay" class="fixed inset-0 bg-[#052659]/90 backdrop-blur-lg z-[9999] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
            <h2 class="text-base font-bold text-[#052659] text-center">TS 2026 指揮中樞身份核驗</h2>
            <div class="space-y-3 text-xs">
                <input type="password" id="input-auth-key" placeholder="輸入密碼 (ts2026)" class="w-full bg-slate-50 border rounded-xl p-3">
                <input type="text" id="input-auth-user" placeholder="例如：活動組-Owen" class="w-full bg-slate-50 border rounded-xl p-3">
                <button onclick="window.submitAuth()" class="w-full bg-[#5483B3] text-white font-bold py-3 rounded-xl">驗證身分並登錄</button>
            </div>
        </div>
    </div>

    <header class="border-b bg-white px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-2 shadow-sm sticky top-0 z-50">
        <div class="text-center md:text-left w-full md:w-auto">
            <h1 class="text-lg font-bold text-[#052659]">TS 2026 年度盛會智慧中樞</h1>
            <p class="text-xs text-emerald-600 font-bold">📡 最初代純淨還原完全體・修正永不跳頁</p>
        </div>
        <div class="flex items-center justify-between md:justify-end gap-3 w-full md:w-auto border-t md:border-t-0 pt-2 md:pt-0">
            <span id="display-user-name" class="text-xs bg-slate-100 px-2.5 py-1 rounded-xl text-slate-600">👤 載入中...</span>
            <span id="cloud-status-badge" class="text-xs text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full font-medium">● 雲端直連</span>
        </div>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row">
        <aside class="w-full lg:w-64 border-b lg:border-b-0 lg:border-r bg-white p-2 lg:p-4 flex flex-row lg:flex-col gap-1.5 overflow-x-auto lg:overflow-x-visible no-scrollbar shrink-0 select-none shadow-sm">
            <div class="flex flex-row lg:flex-col gap-1.5" id="sidebar-menu"></div>
        </aside>

        <main class="flex-1 p-4 lg:p-8 overflow-x-hidden">
            
            <div id="panel-timeline" class="main-panel hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-[#052659]">大會核心時程主骨架</h2>
                    <button onclick="addNewTimelineRow()" class="bg-[#5483B3] text-white text-xs font-bold px-4 py-2 rounded-xl shadow-sm">＋ 新增時段</button>
                </div>
                
                <div class="hidden lg:block bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                    <table class="w-full text-left bg-white border-collapse">
                        <thead>
                            <tr class="bg-slate-100 border-b border-slate-200 text-[#052659] font-bold select-none">
                                <th class="p-4 w-24 text-center border-r border-slate-200">排序</th>
                                <th class="p-4 w-16 text-center border-r border-slate-200">序</th>
                                <th class="p-4 w-36 border-r border-slate-200">時間段</th>
                                <th class="p-4 w-48 border-r border-slate-200">核心節目</th>
                                <th class="p-4 min-w-[200px] border-r border-slate-200">內容與舞台設定</th>
                                <th class="p-4 w-16 text-center">刪</th>
                            </tr>
                        </thead>
                        <tbody id="timeline-desktop-tbody" class="divide-y divide-slate-200 text-sm"></tbody>
                    </table>
                </div>

                <div class="block lg:hidden space-y-4" id="timeline-mobile-container"></div>
            </div>

            <div id="panel-team-generic" class="main-panel hidden space-y-5">
                <div class="bg-white border rounded-2xl p-4 shadow-sm relative">
                    <h2 class="text-[#052659]" id="team-title-display">小組盤</h2>
                    <div class="mt-3">
                        <label class="text-xs font-bold text-slate-400 block mb-1">👥 本組組員名單</label>
                        <div id="team-members-box" contenteditable="true" class="bg-slate-50 border rounded-xl p-3 text-base min-h-[45px] focus:outline-none"></div>
                    </div>
                </div>
                
                <div class="flex justify-between items-center pt-2">
                    <h3 class="text-slate-400 tracking-wider text-xs uppercase">📦 本組核心作戰模塊</h3>
                    <button onclick="window.addNewModuleToTeam()" class="text-xs font-bold text-white bg-[#5483B3] hover:bg-[#436c9b] px-3 py-2 rounded-xl shadow-sm transition-all">
                        <i class="fa-solid fa-plus mr-1"></i> 新增文字方塊
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="team-modules-grid"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        const CORRECT_KEY = "ts2026";
        window.checkAuthAndRun = function() {
            let savedKey = localStorage.getItem('ts_auth_key'); let savedUser = localStorage.getItem('ts_auth_user');
            if (savedKey !== CORRECT_KEY || !savedUser) { document.getElementById('auth-overlay').classList.remove('hidden'); return false; }
            window.currentUser = savedUser; document.getElementById('display-user-name').innerText = `👤 指揮官：${savedUser}`; return true;
        }
        window.submitAuth = function() {
            const inputKey = document.getElementById('input-auth-key').value.trim(); const inputUser = document.getElementById('input-auth-user').value.trim();
            if (inputKey !== CORRECT_KEY || !inputUser) { alert("暗號錯誤！"); return; }
            localStorage.setItem('ts_auth_key', inputKey); localStorage.setItem('ts_auth_user', inputUser); window.location.reload();
        }

        if (window.checkAuthAndRun()) {
            try {
                const app = initializeApp(firebaseConfig); const db = getDatabase(app);
                const dataRef = ref(db, 'ts_2026_realtime_data');
                window.cloudDb = db;
                window.cloudUpdateCell = function(path, value) { set(ref(window.cloudDb, `ts_2026_realtime_data/${path}`), value); };

                onValue(dataRef, (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        window.appData = cloudData;
                        if (!window.appData.currentTab) window.appData.currentTab = "timeline";

                        window.panelList = [
                            { id: "timeline", name: "大會主細流", icon: "fa-clock-history" },
                            { id: "team_activity", name: "活動組工作盤", icon: "fa-users-gear" },
                            { id: "team_admin", name: "行政組工作盤", icon: "fa-folder-open" },
                            { id: "team_design", name: "設計組工作盤", icon: "fa-palette" },
                            { id: "team_game", name: "遊戲組工作盤", icon: "fa-dice" },
                            { id: "team_marketing", name: "行銷組工作盤", icon: "fa-bullhorn" }
                        ];

                        window.renderSidebarMenu();
                        window.renderActivePanelOnly();
                    }
                });
            } catch (e) { console.error(e); }
        }
    </script>

    <script>
        window.renderActivePanelOnly = function() {
            if (!window.appData) return;
            const tabId = window.appData.currentTab || "timeline";
            document.querySelectorAll('.main-panel').forEach(p => p.classList.add('hidden'));

            if(tabId === 'timeline') {
                document.getElementById('panel-timeline').classList.remove('hidden'); renderTimelineTable();
            } else {
                const teamData = window.appData[tabId];
                if(teamData) {
                    document.getElementById('panel-team-generic').classList.remove('hidden'); 
                    document.getElementById('team-title-display').innerText = teamData.name;
                    
                    const membersBox = document.getElementById('team-members-box');
                    if (document.activeElement !== membersBox) { membersBox.innerText = teamData.members || ""; }
                    membersBox.onblur = function() { if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/members`, this.innerText); };

                    renderTeamModules(teamData, tabId);
                }
            }
        }

        window.renderSidebarMenu = function() {
            const menu = document.getElementById('sidebar-menu'); if(!menu || !window.panelList) return;
            let currentTabId = window.appData.currentTab || "timeline";
            let html = "";
            window.panelList.forEach(p => {
                const isActive = currentTabId === p.id;
                html += `<button onclick="window.switchTab('${p.id}')" class="text-left px-4 py-2.5 rounded-xl text-sm ${isActive ? 'bg-[#5483B3]/10 text-[#5483B3] font-bold border-l-4 border-[#5483B3]' : 'text-slate-500 hover:bg-slate-50'}"><i class="fa-solid ${p.icon} mr-1.5 w-4 text-center"></i><span>${p.name}</span></button>`;
            });
            menu.innerHTML = html;
        }

        window.switchTab = function(tabId) { 
            window.appData.currentTab = tabId; 
            window.renderSidebarMenu(); 
            window.renderActivePanelOnly(); 
        }

        window.renderTeamModules = function(teamData, tabId) { 
            const grid = document.getElementById('team-modules-grid'); if(!grid) return; 
            const modules = teamData.modules || []; 
            grid.innerHTML = modules.map((mod, mIdx) => `
                <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm relative card-shadow">
                    <div class="flex justify-between items-center mb-2 select-none">
                        <h4 class="text-base font-bold text-[#052659] w-full" contenteditable="true" onblur="window.updateModuleCell('${tabId}', ${mIdx}, 'title', this.innerText)">${mod.title || '任務名稱'}</h4>
                        <button onclick="window.deleteModuleFromTeam('${tabId}', mIdx)" class="text-slate-400 hover:text-rose-500 text-sm ml-2"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                    <div class="text-sm text-slate-600 bg-slate-50 p-3 rounded-lg focus:outline-none min-h-[60px]" contenteditable="true" onblur="window.updateModuleCell('${tabId}', ${mIdx}, 'content', this.innerText)">${mod.content || ''}</div>
                </div>`).join(''); 
        }
        window.updateModuleCell = function(tabId, mIdx, field, val) { if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/modules/${mIdx}/${field}`, val); }
        window.addNewModuleToTeam = function() { 
            const tabId = window.appData.currentTab || "team_activity"; 
            if(!window.appData[tabId].modules) window.appData[tabId].modules = []; 
            window.appData[tabId].modules.push({ title: "新核心任務方塊", content: "點擊編輯詳細計畫內容與招募人數..." }); 
            if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/modules`, window.appData[tabId].modules); 
        }
        window.deleteModuleFromTeam = function(tabId, mIdx) { if(confirm("確定刪除此文字方塊？")) { window.appData[tabId].modules.splice(mIdx, 1); if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/modules`, window.appData[tabId].modules); } }

        window.renderTimelineTable = function() {
            const desktopTbody = document.getElementById('timeline-desktop-tbody');
            const container = document.getElementById('timeline-mobile-container'); 
            if(!window.appData.timeline) return;

            if(desktopTbody) {
                desktopTbody.innerHTML = window.appData.timeline.map((row, idx) => `
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="p-3 text-center space-x-1 select-none border-r border-slate-200">
                            <button onclick="window.moveTimelineRow(${idx}, -1)" class="bg-slate-100 text-[#5483B3] w-7 h-7 rounded-lg hover:bg-[#5483B3]/20"><i class="fa-solid fa-arrow-up text-xs"></i></button>
                            <button onclick="window.moveTimelineRow(${idx}, 1)" class="bg-slate-100 text-[#5483B3] w-7 h-7 rounded-lg hover:bg-[#5483B3]/20"><i class="fa-solid fa-arrow-down text-xs"></i></button>
                        </td>
                        <td class="p-4 text-center font-bold text-slate-400 bg-slate-50/50 border-r border-slate-200">${idx + 1}</td>
                        <td class="p-4 font-bold text-[#5483B3] border-r border-slate-200" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'time', this.innerText)">${row.time || '12:00'}</td>
                        <td class="p-4 font-bold text-slate-800 border-r border-slate-200" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'module', this.innerText)">${row.module || ''}</td>
                        <td class="p-4 text-slate-600 border-r border-slate-200" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'stage', this.innerText)">${row.stage || ''}</td>
                        <td class="p-4 text-center"><button onclick="window.deleteTimelineRow(${idx})" class="text-slate-300 hover:text-rose-500 text-sm"><i class="fa-solid fa-trash-can"></i></button></td>
                    </tr>`).join('');
            }

            if(container) {
                container.innerHTML = window.appData.timeline.map((row, idx) => `
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 card-shadow space-y-3">
                        <div class="flex justify-between items-center border-b pb-2 select-none">
                            <div class="flex items-center gap-1.5 text-[#5483B3] font-bold font-mono">
                                <i class="fa-regular fa-clock text-sm"></i>
                                <span contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'time', this.innerText)">${row.time || '12:00'}</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="window.moveTimelineRow(${idx}, -1)" class="bg-slate-100 text-slate-500 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-arrow-up text-xs"></i></button>
                                <button onclick="window.moveTimelineRow(${idx}, 1)" class="bg-slate-100 text-slate-500 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-arrow-down text-xs"></i></button>
                                <button onclick="window.deleteTimelineRow(${idx})" class="bg-rose-50 text-rose-500 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-trash-can text-xs"></i></button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 gap-2.5">
                            <div><span class="text-xs font-bold text-slate-400 block mb-0.5">📌 流程名稱</span><div class="font-bold text-slate-800 focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'module', this.innerText)">${row.module || ''}</div></div>
                            <div><span class="text-xs font-bold text-slate-400 block mb-0.5">📝 詳細內容與舞台設定</span><div class="text-slate-600 bg-slate-50 p-2.5 rounded-xl min-h-[40px] focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'stage', this.innerText)">${row.stage || ''}</div></div>
                        </div>
                    </div>`).join('');
            }
        }
        window.moveTimelineRow = function(index, direction) {
            const targetIndex = index + direction; if (targetIndex < 0 || targetIndex >= window.appData.timeline.length) return;
            const temp = window.appData.timeline[index]; window.appData.timeline[index] = window.appData.timeline[targetIndex]; window.appData.timeline[targetIndex] = temp;
            if (window.cloudUpdateCell) window.cloudUpdateCell("timeline", window.appData.timeline);
        }
        window.deleteTimelineRow = function(idx) { if(confirm("確定刪除此流程卡？")) { window.appData.timeline.splice(idx, 1); if(window.cloudUpdateCell) window.cloudUpdateCell(`timeline`, window.appData.timeline); } }
        window.updateTimelineCellData = function(index, field, value) { if(window.cloudUpdateCell) window.cloudUpdateCell(`timeline/${index}/${field}`, value); }
    </script>
</body>
</html>
