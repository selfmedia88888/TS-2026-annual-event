<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜大會雲端指揮官中樞</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1e293b; }
        [contenteditable="true"] { white-space: pre-wrap !important; word-break: break-word !important; }
        [contenteditable="true"]:focus { outline: 2px solid #5483B3; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(84, 131, 179, 0.15); border-radius: 6px; }
        .card-shadow { box-shadow: 0 4px 18px -4px rgba(5, 38, 89, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 針對手持直螢幕的強制大字體 */
        th, td, input, div { font-size: 16px !important; }
        h2 { font-size: 22px !important; font-weight: 700 !important; }
        h3 { font-size: 18px !important; font-weight: 700 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

    <div id="auth-overlay" class="fixed inset-0 bg-[#052659]/90 backdrop-blur-lg z-[9999] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
            <h2 class="text-[#052659] text-center">TS 2026 指揮中樞身份核驗</h2>
            <div class="space-y-3">
                <input type="password" id="input-auth-key" placeholder="輸入密碼 (ts2026)" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
                <input type="text" id="input-auth-user" placeholder="例如：活動組-Owen" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
                <button onclick="window.submitAuth()" class="w-full bg-[#5483B3] text-white font-bold py-3 rounded-xl text-sm">驗證身分並登錄</button>
            </div>
        </div>
    </div>

    <header class="border-b bg-white px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-2 shadow-sm sticky top-0 z-50">
        <div class="text-center md:text-left w-full md:w-auto">
            <h1 class="text-lg font-bold text-[#052659]">TS 2026 年度盛會智慧中樞</h1>
            <p class="text-xs text-rose-500 font-bold">📱 真正手持直螢幕優化・大拇指控盤完全體</p>
        </div>
        <div class="flex items-center justify-between md:justify-end gap-3 w-full md:w-auto border-t md:border-t-0 pt-2 md:pt-0">
            <span id="display-user-name" class="text-xs bg-slate-100 px-2.5 py-1 rounded-xl text-slate-600">👤 載入中...</span>
            <span id="cloud-status-badge" class="text-xs text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full font-medium"></span>
        </div>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row">
        <aside class="w-full lg:w-64 border-b lg:border-b-0 lg:border-r bg-white p-2 lg:p-4 flex flex-row lg:flex-col gap-1.5 overflow-x-auto lg:overflow-x-visible no-scrollbar shrink-0 select-none shadow-sm">
            <div class="flex flex-row lg:flex-col gap-1.5" id="sidebar-menu"></div>
            <div class="lg:pt-4 lg:border-t lg:mt-4 shrink-0 whitespace-nowrap pl-2 lg:pl-0">
                <button onclick="window.createNewCustomPanel()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-3 lg:py-2.5 lg:px-4 rounded-xl text-xs flex items-center justify-center gap-1.5 transition-all">
                    <i class="fa-solid fa-folder-plus text-[#5483B3]"></i> ＋ 新增自訂面板
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 lg:p-8 overflow-x-hidden">
            
            <div id="panel-timeline" class="main-panel hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-[#052659]">大會核心時程主骨架</h2>
                    <button onclick="addNewTimelineRow()" class="bg-[#5483B3] text-white text-xs font-bold px-4 py-2 rounded-xl shadow-sm">＋ 新增時段</button>
                </div>
                <div class="space-y-4" id="timeline-mobile-container"></div>
            </div>

            <div id="panel-checklist" class="main-panel hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-[#052659]">📦 大會現場物資防線檢核表</h2>
                    <button onclick="window.addNewChecklistItem()" class="bg-[#5483B3] text-white text-xs font-bold px-4 py-2 rounded-xl">＋ 新增資產物資</button>
                </div>
                <div class="bg-white border rounded-xl divide-y card-shadow" id="checklist-box"></div>
            </div>

            <div id="panel-team-generic" class="main-panel hidden space-y-5">
                <div class="bg-white border rounded-2xl p-4 lg:p-6 shadow-sm relative">
                    <div class="flex justify-between items-start">
                        <h2 class="text-[#052659]" id="team-title-display">小組盤</h2>
                        <button id="btn-delete-entire-panel" class="text-xs font-bold text-rose-500 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition-all hidden"><i class="fa-solid fa-trash-can mr-1"></i> 刪除此面板</button>
                    </div>
                    <div class="mt-3">
                        <label class="text-xs font-bold text-slate-400 block mb-1">👥 本組組員名單</label>
                        <div id="team-members-box" contenteditable="true" class="bg-slate-50 border rounded-xl p-3 text-base min-h-[45px] focus:outline-none"></div>
                    </div>
                </div>

                <div id="admin-venue-seating-dashboard" class="space-y-4 hidden border-t pt-4">
                    <div class="bg-slate-900 rounded-xl p-3 text-white flex flex-col gap-1 text-sm font-mono card-shadow">
                        <div class="font-bold text-emerald-400">🍳 行政組專用：廚房總出菜雷達</div>
                        <div class="flex justify-between border-t border-slate-800 pt-1 text-xs">
                            <div>總人數: <span id="panel-stat-total" class="text-[#C1E8FF] font-bold">0</span></div>
                            <div>葷食: <span id="panel-stat-meat" class="text-amber-400 font-bold">0</span></div>
                            <div>🟢 素食: <span id="panel-stat-veg" class="text-emerald-400 font-bold">0</span></div>
                        </div>
                    </div>
                    <div class="bg-white border rounded-xl p-3 flex justify-between items-center gap-2">
                        <h2 class="text-sm font-bold text-[#052659]">🏛️ 主會場 400人桌次矩陣</h2>
                        <div class="flex items-center gap-1.5 bg-slate-50 p-1 rounded-lg border">
                            <input type="number" id="input-total-tables" min="1" max="100" class="w-12 bg-white border text-center font-bold text-[#052659]" onchange="window.adjustTotalTables(this.value)"> <span class="text-xs text-slate-400">桌</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-8 lg:grid-cols-10 gap-2.5" id="venue-tables-grid"></div>
                    <div id="table-details-box" class="bg-white border-2 border-slate-300 rounded-xl p-4 card-shadow hidden">
                        <h3 class="text-sm font-bold text-[#052659] border-b pb-2 mb-3" id="selected-table-title">🎯 1桌10人座位管理</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-2.5" id="seats-inputs-grid"></div>
                    </div>
                </div>
                
                <div class="flex justify-between items-center pt-2">
                    <h3 class="text-slate-400 tracking-wider text-xs uppercase">📦 本組核心作戰模塊</h3>
                    <button onclick="window.addNewModuleToTeam()" class="text-xs font-bold text-white bg-[#5483B3] hover:bg-[#436c9b] px-3 py-2 rounded-xl shadow-sm transition-all">
                        <i class="fa-solid fa-plus mr-1"></i> 新增文字方塊
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="team-modules-grid"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        const CORRECT_KEY = "ts2026";
        window.checkAuthAndRun = function() {
            let savedKey = localStorage.getItem('ts_auth_key'); let savedUser = localStorage.getItem('ts_auth_user');
            if (savedKey !== CORRECT_KEY || !savedUser) { document.getElementById('auth-overlay').classList.remove('hidden'); return false; }
            window.currentUser = savedUser; document.getElementById('display-user-name').innerText = `👤 指揮官：${savedUser}`; return true;
        }
        window.submitAuth = function() {
            const inputKey = document.getElementById('input-auth-key').value.trim(); const inputUser = document.getElementById('input-auth-user').value.trim();
            if (inputKey !== CORRECT_KEY || !inputUser) { alert("暗號錯誤！"); return; }
            localStorage.setItem('ts_auth_key', inputKey); localStorage.setItem('ts_auth_user', inputUser); window.location.reload();
        }

        if (window.checkAuthAndRun()) {
            try {
                const app = initializeApp(firebaseConfig); const db = getDatabase(app);
                const dataRef = ref(db, 'ts_2026_realtime_data');
                window.cloudDb = db;
                window.cloudUpdateCell = function(path, value) { set(ref(window.cloudDb, `ts_2026_realtime_data/${path}`), value); };

                onValue(dataRef, (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        window.appData = cloudData;
                        if (!window.appData.currentTab) window.appData.currentTab = "timeline";
                        if (!window.appData.tablesConfig) window.appData.tablesConfig = { totalTables: 40 };
                        if (!window.appData.tablesConfig.tablesData) {
                            window.appData.tablesConfig.tablesData = {};
                            for(let i=1; i<=100; i++) { window.appData.tablesConfig.tablesData[i] = { seats: Array(10).fill({ name: "", isVeg: false }) }; }
                        }
                        if (!window.appData.checklist) window.appData.checklist = [];

                        window.panelList = [
                            { id: "timeline", name: "大會主細流", icon: "fa-clock-history" },
                            { id: "team_activity", name: "活動組工作盤", icon: "fa-users-gear" },
                            { id: "team_admin", name: "行政組工作盤", icon: "fa-folder-open" },
                            { id: "team_design", name: "設計組工作盤", icon: "fa-palette" },
                            { id: "team_game", name: "遊戲組工作盤", icon: "fa-dice" },
                            { id: "team_marketing", name: "行銷組工作盤", icon: "fa-bullhorn" },
                            { id: "checklist", name: "物資防線檢核條目表", icon: "fa-list-check" }
                        ];

                        window.renderSidebarMenu();
                        window.updateTableBoxVegLightOnly(); 
                        window.calculateKitchenRadar();
                        window.renderActivePanelOnly();
                        
                        document.getElementById('cloud-status-badge').innerHTML = `● 同步中`;
                    }
                });
            } catch (e) { console.error(e); }
        }
    </script>

    <script>
        window.renderActivePanelOnly = function() {
            if (!window.appData) return;
            const tabId = window.appData.currentTab || "timeline";
            
            document.querySelectorAll('.main-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('admin-venue-seating-dashboard').classList.add('hidden'); 

            if(tabId === 'timeline') {
                document.getElementById('panel-timeline').classList.remove('hidden'); renderTimelineTable();
            } else if(tabId === 'checklist') {
                document.getElementById('panel-checklist').classList.remove('hidden'); renderChecklist();
            } else {
                const teamData = window.appData[tabId];
                if(teamData) {
                    document.getElementById('panel-team-generic').classList.remove('hidden'); 
                    document.getElementById('team-title-display').innerText = teamData.name;
                    
                    const membersBox = document.getElementById('team-members-box');
                    if (document.activeElement !== membersBox) { membersBox.innerText = teamData.members || ""; }
                    membersBox.onblur = function() { if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/members`, this.innerText); };
                    
                    if (tabId === 'team_admin' || teamData.name.includes("行政組")) {
                        document.getElementById('admin-venue-seating-dashboard').classList.remove('hidden');
                        renderVenueTablesGrid();
                    }

                    const delBtn = document.getElementById('btn-delete-entire-panel');
                    const coreIds = ['timeline', 'checklist', 'team_activity', 'team_admin', 'team_design', 'team_game', 'team_marketing'];
                    if (!coreIds.includes(tabId)) {
                        delBtn.classList.remove('hidden');
                        delBtn.onclick = function() { window.deleteEntireCustomPanel(tabId); };
                    } else { delBtn.classList.add('hidden'); }

                    renderTeamModules(teamData, tabId);
                }
            }
        }

        window.renderSidebarMenu = function() {
            const menu = document.getElementById('sidebar-menu'); if(!menu || !window.panelList) return;
            let currentTabId = window.appData.currentTab || "timeline";
            let html = "";
            
            window.panelList.forEach(p => {
                const isActive = currentTabId === p.id;
                html += `<button onclick="window.switchTab('${p.id}')" class="text-left px-3 py-2 rounded-xl text-sm ${isActive ? 'bg-[#5483B3]/10 text-[#5483B3] font-bold border-l-4 border-[#5483B3]' : 'text-slate-500 hover:bg-slate-50'}"><i class="fa-solid ${p.icon} mr-1.5 w-4 text-center"></i><span>${p.name}</span></button>`;
            });

            if (window.appData.panels) {
                window.appData.panels.forEach(p => {
                    const coreIds = ['timeline', 'checklist', 'team_activity', 'team_admin', 'team_design', 'team_game', 'team_marketing', 'tunnel', 'arsenal'];
                    if (coreIds.includes(p.id) || p.name.includes("時光隧道") || p.name.includes("軍火庫")) return;
                    const isActive = currentTabId === p.id;
                    html += `<button onclick="window.switchTab('${p.id}')" class="text-left px-3 py-2 rounded-xl text-sm ${isActive ? 'bg-[#5483B3]/10 text-[#5483B3] font-bold border-l-4 border-[#5483B3]' : 'text-slate-500 hover:bg-slate-50'}"><i class="fa-solid fa-folder mr-1.5 w-4 text-center"></i><span>${p.name}</span></button>`;
                });
            }
            menu.innerHTML = html;
        }

        // 🔴 ⚡ 關鍵修正：切換分頁直接修改本地變數，絕對不准重置雲端監聽！永不跳頁！
        window.switchTab = function(tabId) { 
            window.appData.currentTab = tabId; 
            window.renderSidebarMenu(); 
            window.renderActivePanelOnly(); 
        }

        // 📱 ⚡ 核心優化：主細流改為由上到下的「直向時間軸科技卡片」，手持單手狂滑、絕不跳走！
        window.renderTimelineTable = function() {
            const container = document.getElementById('timeline-mobile-container'); if(!container || !window.appData.timeline) return;
            container.innerHTML = window.appData.timeline.map((row, idx) => `
                <div class="bg-white border border-slate-200 rounded-2xl p-4 card-shadow space-y-3">
                    <div class="flex justify-between items-center border-b pb-2 select-none">
                        <div class="flex items-center gap-1.5 text-[#5483B3] font-bold font-mono">
                            <i class="fa-regular fa-clock text-sm"></i>
                            <span contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'time', this.innerText)">${row.time || '12:00'}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="window.moveTimelineRow(${idx}, -1)" class="bg-slate-100 text-slate-500 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-arrow-up text-xs"></i></button>
                            <button onclick="window.moveTimelineRow(${idx}, 1)" class="bg-slate-100 text-slate-500 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-arrow-down text-xs"></i></button>
                            <button onclick="window.deleteTimelineRow(${idx})" class="bg-rose-50 text-rose-500 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-2.5">
                        <div><span class="text-xs font-bold text-slate-400 block mb-0.5">📌 流程名稱</span><div class="font-bold text-slate-800 focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'module', this.innerText)">${row.module || ''}</div></div>
                        <div><span class="text-xs font-bold text-slate-400 block mb-0.5">📝 詳細內容與設定</span><div class="text-slate-600 bg-slate-50 p-2.5 rounded-xl min-h-[40px] focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'stage', this.innerText)">${row.stage || ''}</div></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><span class="text-[11px] font-bold text-slate-400 block mb-0.5">🛠️ 器材清單</span><div class="text-xs text-slate-600 border rounded-xl p-2 focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'pa', this.innerText)">${row.pa || ''}</div></div>
                            <div><span class="text-[11px] font-bold text-slate-400 block mb-0.5">💡 備註</span><div class="text-xs text-slate-600 border rounded-xl p-2 focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'notes', this.innerText)">${row.notes || ''}</div></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 border-t pt-2">
                            <div><span class="text-[11px] font-bold text-slate-400 block mb-0.5">🎵 PA / 音控</span><div class="text-xs text-slate-700 font-bold focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'audio', this.innerText)">${row.audio || ''}</div></div>
                            <div><span class="text-[11px] font-bold text-slate-400 block mb-0.5">📹 攝影畫面</span><div class="text-xs text-slate-700 font-bold focus:outline-none" contenteditable="true" onblur="window.updateTimelineCellData(${idx}, 'video', this.innerText)">${row.video || ''}</div></div>
                        </div>
                    </div>
                </div>`).join('');
        }
        window.moveTimelineRow = function(index, direction) {
            const targetIndex = index + direction; if (targetIndex < 0 || targetIndex >= window.appData.timeline.length) return;
            const temp = window.appData.timeline[index]; window.appData.timeline[index] = window.appData.timeline[targetIndex]; window.appData.timeline[targetIndex] = temp;
            if (window.cloudUpdateCell) window.cloudUpdateCell("timeline", window.appData.timeline);
        }
        window.addNewTimelineRow = function() {
            if(!window.appData.timeline) window.appData.timeline = [];
            window.appData.timeline.push({ time: "12:00", module: "新項目", stage: "", pa: "", notes: "", audio: "", video: "" });
            if(window.cloudUpdateCell) window.cloudUpdateCell(`timeline`, window.appData.timeline);
        }
        window.deleteTimelineRow = function(idx) { if(confirm("確定刪除此流程卡？")) { window.appData.timeline.splice(idx, 1); if(window.cloudUpdateCell) window.cloudUpdateCell(`timeline`, window.appData.timeline); } }

        // 📊 條列式物資檢核
        window.renderChecklist = function() {
            const box = document.getElementById('checklist-box'); if(!box) return;
            box.innerHTML = (window.appData.checklist || []).map((item, idx) => `
                <div class="flex items-center p-4 gap-4 ${item.done ? 'bg-slate-50/50' : 'bg-white'}">
                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="window.toggleCheckItem(${idx})" class="w-6 h-6 rounded border-slate-300 text-[#5483B3] cursor-pointer shrink-0">
                    <div class="flex-1 text-base font-medium focus:outline-none ${item.done ? 'line-through text-slate-400' : 'text-slate-800'}" contenteditable="true" onblur="window.updateCheckItemText(${idx}, this.innerText)">${item.item || ''}</div>
                    <button onclick="window.deleteCheckItem(${idx})" class="text-slate-300 hover:text-rose-500 p-1 shrink-0"><i class="fa-solid fa-trash-can"></i></button>
                </div>`).join('');
        }
        window.toggleCheckItem = function(idx) { window.appData.checklist[idx].done = !window.appData.checklist[idx].done; if (window.cloudUpdateCell) window.cloudUpdateCell(`checklist/${idx}/done`, window.appData.checklist[idx].done); }
        window.updateCheckItemText = function(idx, val) { window.appData.checklist[idx].item = val; if (window.cloudUpdateCell) window.cloudUpdateCell(`checklist/${idx}/${item}`, val); }
        window.addNewChecklistItem = function() { if(!window.appData.checklist) window.appData.checklist = []; window.appData.checklist.push({ done: false, item: "點擊編輯新資產物資..." }); if (window.cloudUpdateCell) window.cloudUpdateCell(`checklist`, window.appData.checklist); }
        window.deleteCheckItem = function(idx) { if(confirm("確定刪除此物資？")) { window.appData.checklist.splice(idx, 1); if (window.cloudUpdateCell) window.cloudUpdateCell(`checklist`, window.appData.checklist); } }

        // 🪑 行政組內建：1-40 桌發光亮燈大方塊
        window.renderVenueTablesGrid = function() {
            const grid = document.getElementById('venue-tables-grid'); const totalInput = document.getElementById('input-total-tables'); if (!grid || !window.appData.tablesConfig) return;
            const config = window.appData.tablesConfig; totalInput.value = config.totalTables || 40;
            let html = ""; 
            for (let i = 1; i <= config.totalTables; i++) { 
                const tData = config.tablesData ? config.tablesData[i] : null; 
                const hasVeg = tData && tData.seats ? tData.seats.some(s => s && s.isVeg) : false; 
                const isSelected = window.appData.selectedTable == i; 
                // 🔴 🟢 真正發光綠色大按鈕：只要有素，手機大盤直接通電爆亮！
                let style = isSelected ? 'bg-[#052659] text-white border-[#052659] font-bold scale-105 shadow-md' : (hasVeg ? 'bg-emerald-600 text-white border-emerald-700 font-bold shadow-lg shadow-emerald-600/30' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'); 
                html += `<button id="table-box-btn-${i}" onclick="window.selectTableForDetails(${i})" class="h-16 rounded-2xl border flex flex-col items-center justify-center transition-all ${style}"><span>第 ${i} 桌</span><span id="table-veg-indicator-${i}">${hasVeg ? '<span class="text-[11px] text-emerald-100 underline">🟢有素食</span>' : ''}</span></button>`; 
            }
            grid.innerHTML = html; window.renderTableSeatsControl();
        }
        window.adjustTotalTables = function(val) { const num = parseInt(val); if (num < 1 || num > 100) return; window.appData.tablesConfig.totalTables = num; if (window.cloudUpdateCell) window.cloudUpdateCell("tablesConfig/totalTables", num); }
        window.selectTableForDetails = function(tableNum) { window.appData.selectedTable = tableNum; window.renderVenueTablesGrid(); }
        window.renderTableSeatsControl = function() {
            const box = document.getElementById('table-details-box'); const grid = document.getElementById('seats-inputs-grid'); const title = document.getElementById('selected-table-title'); if (!box || !grid || !title) return; const tNum = window.appData.selectedTable; if (!tNum || tNum > window.appData.tablesConfig.totalTables) { box.classList.add('hidden'); return; } box.classList.remove('hidden'); title.innerHTML = `第 【${tNum}】 桌座位安排名單`; const tData = window.appData.tablesConfig.tablesData[tNum] || { seats: Array(10).fill({ name: "", isVeg: false }) };
            let html = ""; 
            for (let s = 0; s < 10; s++) { 
                const seat = tData.seats[s] || { name: "", isVeg: false }; const isVeg = seat.isVeg || false; 
                html += `<div id="seat-wrapper-${tNum}-${s}" class="flex items-center gap-2 bg-slate-50 border ${isVeg ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200'} p-2 rounded-xl"><span class="text-sm font-bold text-slate-400 w-5 text-center">${s+1}</span><input type="text" id="seat-input-${tNum}-${s}" value="${seat.name || ''}" placeholder="空位" oninput="window.updateSeatName(${tNum}, ${s}, this.value)" class="w-full bg-transparent border-none focus:outline-none font-bold ${isVeg ? 'text-emerald-700' : 'text-slate-800'}"><button id="seat-veg-btn-${tNum}-${s}" onclick="window.toggleSeatVeg(${tNum}, ${s})" class="px-3 py-1.5 rounded-lg text-sm font-bold border transition-all ${isVeg ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-slate-400 border-slate-200'}">素</button></div>`; 
            } grid.innerHTML = html;
        }
        window.updateSeatName = function(tableNum, seatIdx, val) { if(!window.appData.tablesConfig.tablesData[tableNum].seats) { window.appData.tablesConfig.tablesData[tableNum].seats = Array(10).fill({ name: "", isVeg: false }); } window.appData.tablesConfig.tablesData[tableNum].seats[seatIdx].name = val; if (window.cloudUpdateCell) window.cloudUpdateCell(`tablesConfig/tablesData/${tableNum}/seats/${seatIdx}/name`, val); }
        window.toggleSeatVeg = function(tableNum, seatIdx) {
            const seat = window.appData.tablesConfig.tablesData[tableNum].seats[seatIdx] || { name: "", isVeg: false }; const nextVeg = !seat.isVeg; window.appData.tablesConfig.tablesData[tableNum].seats[seatIdx].isVeg = nextVeg;
            if (window.cloudUpdateCell) { window.cloudUpdateCell(`tablesConfig/tablesData/${tableNum}/seats/${seatIdx}/isVeg`, nextVeg); window.updateTableBoxVegLightOnly(); window.calculateKitchenRadar(); window.renderTableSeatsControl(); }
        }
        window.updateTableBoxVegLightOnly = function() {
            const config = window.appData.tablesConfig; if(!config) return;
            for (let i = 1; i <= (config.totalTables || 40); i++) {
                const tData = config.tablesData ? config.tablesData[i] : null; const hasVeg = tData && tData.seats ? tData.seats.some(s => s && s.isVeg) : false;
                const btn = document.getElementById(`table-box-btn-${i}`); const indicator = document.getElementById(`table-veg-indicator-${i}`);
                if (btn && indicator) {
                    if (window.appData.selectedTable == i) { btn.className = `h-16 rounded-2xl border flex flex-col items-center justify-center transition-all bg-[#052659] text-white border-[#052659] font-bold scale-105 shadow-md`; }
                    else { btn.className = `h-16 rounded-2xl border flex flex-col items-center justify-center transition-all ${hasVeg ? 'bg-emerald-600 text-white border-emerald-700 font-bold shadow-lg' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'}`; }
                    indicator.innerHTML = hasVeg ? '<span class="text-[11px] text-white underline">🟢有素食</span>' : '';
                }
            }
        }
        window.calculateKitchenRadar = function() {
            if (!window.appData || !window.appData.tablesConfig || !window.appData.tablesConfig.tablesData) return;
            let total = 0, veg = 0; const config = window.appData.tablesConfig;
            for(let i=1; i<=(config.totalTables || 40); i++) { const tData = config.tablesData[i]; if(tData && tData.seats) { tData.seats.forEach(s => { if(s && s.name && s.name.trim() !== "") { total++; if(s.isVeg) veg++; } }); } }
            const tEl = document.getElementById('panel-stat-total'); const vEl = document.getElementById('panel-stat-veg');
            if (tEl && vEl) { tEl.innerText = total; vEl.innerText = veg; document.getElementById('panel-stat-meat').innerText = total - veg; }
        }

        // 📦 自訂任務與自訂面板新增
        window.renderTeamModules = function(teamData, tabId) { 
            const grid = document.getElementById('team-modules-grid'); if(!grid) return; 
            const modules = teamData.modules || []; 
            grid.innerHTML = modules.map((mod, mIdx) => `
                <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm relative card-shadow">
                    <div class="flex justify-between items-center mb-2 select-none">
                        <h4 class="text-base font-bold text-[#052659] w-full" contenteditable="true" onblur="window.updateModuleCell('${tabId}', ${mIdx}, 'title', this.innerText)">${mod.title || '任務名稱'}</h4>
                        <button onclick="window.deleteModuleFromTeam('${tabId}', ${mIdx})" class="text-slate-400 hover:text-rose-500 text-sm ml-2"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                    <div class="text-sm text-slate-600 bg-slate-50 p-3 rounded-lg focus:outline-none min-h-[60px]" contenteditable="true" onblur="window.updateModuleCell('${tabId}', ${mIdx}, 'content', this.innerText)">${mod.content || ''}</div>
                </div>`).join(''); 
        }
        window.updateModuleCell = function(tabId, mIdx, field, val) { if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/modules/${mIdx}/${field}`, val); }
        window.addNewModuleToTeam = function() { 
            const tabId = window.appData.currentTab || "team_activity"; 
            if(!window.appData[tabId].modules) window.appData[tabId].modules = []; 
            window.appData[tabId].modules.push({ title: "新核心任務方塊", content: "點擊編輯詳細計畫內容與招募人數..." }); 
            if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/modules`, window.appData[tabId].modules); 
        }
        window.deleteModuleFromTeam = function(tabId, mIdx) { if(confirm("確定刪除此文字方塊？")) { window.appData[tabId].modules.splice(mIdx, 1); if(window.cloudUpdateCell) window.cloudUpdateCell(`${tabId}/modules`, window.appData[tabId].modules); } }

        window.createNewCustomPanel = function() {
            const panelName = prompt("請輸入全新自訂工作面板名稱:"); if (!panelName || !panelName.trim()) return;
            const newId = "custom_" + Date.now(); if(!window.appData.panels) window.appData.panels = [];
            window.appData.panels.push({ id: newId, name: panelName.trim(), members: "", modules: [{ title: "自訂標題", content: "作戰內文..." }] });
            if(window.cloudUpdateCell) { window.cloudUpdateCell(`panels`, window.appData.panels); window.switchTab(newId); }
        }
        window.deleteEntireCustomPanel = function(tabId) {
            if (confirm("確定完全刪除此面板？")) {
                const pIdx = window.appData.panels.findIndex(p => p.id === tabId);
                if (pIdx !== -1) { window.appData.panels.splice(pIdx, 1); if(window.cloudUpdateCell) { window.cloudUpdateCell(`panels`, window.appData.panels); window.switchTab("timeline"); } }
            }
        }
    </script>
</body>
</html>
