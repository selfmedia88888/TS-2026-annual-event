<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>TS 2026 最終救援版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">
    <div id="display-area" class="space-y-4">
        <h1 class="text-xl font-bold">正在讀取雲端原始資料...</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'ts_2026_realtime_data');

        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            const display = document.getElementById('display-area');
            display.innerHTML = '<h1 class="text-xl font-bold mb-4">雲端所有資料內容：</h1>';
            
            // 直接暴力把雲端所有東西轉成文字列出來
            display.innerHTML += `<pre class="bg-white p-4 border rounded shadow-sm text-sm overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>`;
        });
    </script>
</body>
</html>
