<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜大會雲端指揮官中樞</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1e293b; }
        [contenteditable="true"] { white-space: pre-wrap !important; word-break: break-word !important; }
        [contenteditable="true"]:focus { outline: 2px solid #5483B3; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(84, 131, 179, 0.15); border-radius: 6px; }
        th, td, input, div, button { font-size: 16px !important; font-weight: 500 !important; }
        thead th { font-size: 16px !important; font-weight: 700 !important; }
        .main-panel h2 { font-size: 24px !important; font-weight: 700 !important; }
        .card-shadow { box-shadow: 0 4px 18px -4px rgba(5, 38, 89, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .main-panel { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">
    <div id="auth-overlay" class="fixed inset-0 bg-[#052659]/90 backdrop-blur-lg z-[9999] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
            <h2 class="text-[#052659] text-center font-bold">TS 2026 指揮中樞身份核驗</h2>
            <div class="space-y-3">
                <input type="password" id="input-auth-key" placeholder="輸入密碼 (ts2026)" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
                <input type="text" id="input-auth-user" placeholder="例如：活動組-Owen" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
                <button onclick="window.submitAuth()" class="w-full bg-[#5483B3] text-white font-bold py-3 rounded-xl text-sm">驗證身分並登錄</button>
            </div>
        </div>
    </div>

    <header class="border-b bg-white px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-2 shadow-sm sticky top-0 z-50">
        <div><h1 class="text-xl font-bold text-[#052659]">TS 2026 年度盛會智慧中樞</h1></div>
        <div class="flex items-center gap-3"><span id="display-user-name" class="text-sm bg-slate-100 px-3 py-1.5 rounded-xl text-slate-600 font-bold">👤 載入中...</span></div>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row">
        <aside class="w-full lg:w-64 border-b lg:border-b-0 lg:border-r bg-white p-2 lg:p-4 flex flex-row lg:flex-col gap-1.5 overflow-x-auto lg:overflow-x-visible no-scrollbar shrink-0 select-none shadow-sm">
            <div class="flex flex-row lg:flex-col gap-1.5" id="sidebar-menu"></div>
            <div class="lg:pt-4 lg:border-t lg:mt-4">
                <button onclick="window.createNewCustomPanel()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-3 rounded-xl text-xs flex items-center justify-center gap-1.5"><i class="fa-solid fa-folder-plus text-[#5483B3]"></i> ＋ 新增自訂面板</button>
            </div>
        </aside>

        <main class="flex-1 p-4 lg:p-8 overflow-x-hidden">
            <div id="panel-timeline" class="main-panel hidden space-y-4">
                <div class="flex justify-between items-center"><h2 class="text-[#052659] font-bold">📊 大會主細流主骨架</h2><button onclick="addNewTimelineRow()" class="bg-[#5483B3] text-white text-sm font-bold px-4 py-2 rounded-xl">＋ 新增時段</button></div>
                <div class="overflow-x-auto bg-white border border-slate-200 rounded-2xl"><table class="w-full text-left border-collapse min-w-[1200px]"><thead class="bg-slate-100"><tr class="text-[#052659] font-bold">
                    <th class="p-4 border-r">排序</th><th class="p-4 border-r">序</th><th class="p-4 border-r">時間段</th><th class="p-4 border-r">流程</th><th class="p-4 border-r">內容</th><th class="p-4 border-r">器材</th><th class="p-4 border-r">備註</th><th class="p-4 border-r">PA/音控</th><th class="p-4 border-r">攝影</th><th class="p-4">刪</th>
                </tr></thead><tbody id="timeline-desktop-tbody"></tbody></table></div>
            </div>
            <div id="panel-seating" class="main-panel hidden space-y-4">
                <div class="bg-slate-900 rounded-xl p-4 text-white flex justify-between text-sm"><div>總人數:<span id="panel-stat-total">0</span></div><div>葷:<span id="panel-stat-meat">0</span></div><div>素:<span id="panel-stat-veg">0</span></div></div>
                <div class="bg-white border rounded-xl p-3 flex justify-between items-center"><h2 class="font-bold">🏛️ 桌次管理</h2><input type="number" id="input-total-tables" class="w-12 border text-center" onchange="window.adjustTotalTables(this.value)"></div>
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 lg:grid-cols-10 gap-2.5" id="venue-tables-grid"></div>
                <div id="table-details-box" class="bg-white border rounded-xl p-4 hidden"><h3 id="selected-table-title" class="font-bold border-b pb-2 mb-3"></h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3" id="seats-inputs-grid"></div></div>
            </div>
            <div id="panel-checklist" class="main-panel hidden space-y-4">
                <div class="flex justify-between items-center"><h2 class="font-bold">📦 物資防線檢核表</h2><button onclick="window.addNewChecklistItem()" class="bg-[#5483B3] text-white text-xs font-bold px-4 py-2 rounded-xl">＋ 新增</button></div>
                <div class="bg-white border rounded-xl divide-y" id="checklist-box"></div>
            </div>
            <div id="panel-team-generic" class="main-panel hidden space-y-5">
                <div class="bg-white border rounded-2xl p-4 shadow-sm"><div class="flex justify-between"><h2 class="font-bold" id="team-title-display"></h2><button id="btn-delete-entire-panel" class="text-xs bg-rose-500 text-white px-4 py-2 rounded-xl">刪除面板</button></div><div class="mt-3"><label class="text-xs text-slate-400">👥 組員名單</label><div id="team-members-box" contenteditable="true" class="bg-slate-50 border rounded-xl p-3"></div></div></div>
                <div class="flex justify-between items-center"><h3 class="text-xs uppercase">📦 核心作戰模塊</h3><button onclick="window.addNewModuleToTeam()" class="text-xs bg-[#5483B3] text-white px-3 py-2 rounded-xl">＋ 新增文字方塊</button></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="team-modules-grid"></div>
            </div>
        </main>
    </div>

    <script>
        // --- 這些函數必須先定義 ---
        window.switchTab = function(tabId) { window.currentActiveTab = tabId; window.renderSidebarMenu(); window.renderActivePanelOnly(); }
        window.createNewCustomPanel = function() { const name = prompt("輸入小組名稱:"); if (!name) return; const newId = "panel_" + Date.now(); window.cloudUpdateCell(newId, { name: name, members: "...", modules: [] }); }
        window.deleteEntireCustomPanel = function(tabId) { if (confirm("確定刪除？")) { window.currentActiveTab = "timeline"; window.cloudDeleteNode(tabId); } }
        window.updateTimelineCellData = function(idx, f, v) { window.cloudUpdateCell(`timeline/${idx}/${f}`, v); }
        window.addNewTimelineRow = function() { if(!window.appData.timeline) window.appData.timeline = []; window.appData.timeline.push({ time: "12:00" }); window.cloudUpdateCell(`timeline`, window.appData.timeline); }
        window.deleteTimelineRow = function(idx) { window.appData.timeline.splice(idx, 1); window.cloudUpdateCell(`timeline`, window.appData.timeline); }
        window.moveTimelineRow = function(idx, dir) { const t = idx + dir; if(t<0 || t>=window.appData.timeline.length) return; const tmp = window.appData.timeline[idx]; window.appData.timeline[idx] = window.appData.timeline[t]; window.appData.timeline[t] = tmp; window.cloudUpdateCell(`timeline`, window.appData.timeline); window.renderTimelineTable(); }
        window.toggleCheckItem = function(idx) { window.cloudUpdateCell(`checklist/${idx}/done`, !window.appData.checklist[idx].done); }
        window.updateCheckItemText = function(idx, v) { window.cloudUpdateCell(`checklist/${idx}/item`, v); }
        window.addNewChecklistItem = function() { if(!window.appData.checklist) window.appData.checklist = []; window.appData.checklist.push({ done:false, item:"新項目" }); window.cloudUpdateCell(`checklist`, window.appData.checklist); }
        window.deleteCheckItem = function(idx) { window.appData.checklist.splice(idx, 1); window.cloudUpdateCell(`checklist`, window.appData.checklist); }
        window.adjustTotalTables = function(v) { window.cloudUpdateCell("tablesConfig/totalTables", parseInt(v)); }
        window.updateSeatName = function(tn, si, v) { clearTimeout(window.seatTimer); window.seatTimer = setTimeout(() => { window.cloudUpdateCell(`tablesConfig/tablesData/${tn}/seats/${si}/name`, v); }, 500); }
        window.toggleSeatVeg = function(tn, si) { window.cloudUpdateCell(`tablesConfig/tablesData/${tn}/seats/${si}/isVeg`, !((window.appData.tablesConfig.tablesData[tn].seats[si]||{}).isVeg)); }
        window.updateModuleCell = function(tid, mi, f, v) { window.cloudUpdateCell(`${tid}/modules/${mi}/${f}`, v); }
        window.addNewModuleToTeam = function() { const tid = window.currentActiveTab; if(!window.appData[tid].modules) window.appData[tid].modules = []; window.appData[tid].modules.push({ title: "新任務", content: "" }); window.cloudUpdateCell(`${tid}/modules`, window.appData[tid].modules); }
        window.deleteModuleFromTeam = function(tid, mi) { window.appData[tid].modules.splice(mi, 1); window.cloudUpdateCell(`${tid}/modules`, window.appData[tid].modules); }

        window.renderSidebarMenu = function() {
            const menu = document.getElementById('sidebar-menu'); if(!menu) return;
            let html = `<button onclick="window.switchTab('timeline')" class="text-left px-4 py-2.5 rounded-xl text-sm ${window.currentActiveTab==='timeline'?'bg-[#5483B3]/10':''}">大會主細流</button><button onclick="window.switchTab('seating')" class="text-left px-4 py-2.5 rounded-xl text-sm ${window.currentActiveTab==='seating'?'bg-[#5483B3]/10':''}">桌位管理</button><button onclick="window.switchTab('checklist')" class="text-left px-4 py-2.5 rounded-xl text-sm ${window.currentActiveTab==='checklist'?'bg-[#5483B3]/10':''}">物資表</button>`;
            for(let key in window.appData) {
                if(['timeline','seating','checklist','tablesConfig','timelineConfig','currentTab'].includes(key)) continue;
                if(window.appData[key].name) html += `<button onclick="window.switchTab('${key}')" class="text-left px-4 py-2.5 rounded-xl text-sm ${window.currentActiveTab===key?'bg-[#5483B3]/10':''}">${window.appData[key].name}</button>`;
            }
            menu.innerHTML = html;
        }

        window.renderActivePanelOnly = function() {
            if(!window.appData) return;
            const tid = window.currentActiveTab || 'timeline';
            document.querySelectorAll('.main-panel').forEach(p => p.classList.add('hidden'));
            if(tid==='timeline') { document.getElementById('panel-timeline').classList.remove('hidden'); window.renderTimelineTable(); }
            else if(tid==='seating') { document.getElementById('panel-seating').classList.remove('hidden'); window.renderVenueTablesGrid(); }
            else if(tid==='checklist') { document.getElementById('panel-checklist').classList.remove('hidden'); window.renderChecklist(); }
            else if(window.appData[tid]) {
                document.getElementById('panel-team-generic').classList.remove('hidden');
                document.getElementById('team-title-display').innerText = window.appData[tid].name;
                document.getElementById('team-members-box').innerText = window.appData[tid].members||'';
                window.renderTeamModules(window.appData[tid], tid);
            }
        }
        
        window.renderTimelineTable = function() { const tbody = document.getElementById('timeline-desktop-tbody'); if(!tbody || !window.appData.timeline) return; tbody.innerHTML = window.appData.timeline.map((r,i)=> `<tr><td class="p-3"><button onclick="window.moveTimelineRow(${i},-1)">↑</button><button onclick="window.moveTimelineRow(${i},1)">↓</button></td><td>${i+1}</td><td class="p-4" contenteditable="true" onblur="window.updateTimelineCellData(${i},'time',this.innerText)">${r.time||''}</td><td class="p-4" contenteditable="true" onblur="window.updateTimelineCellData(${i},'module',this.innerText)">${r.module||''}</td><td class="p-4" contenteditable="true" onblur="window.updateTimelineCellData(${i},'stage',this.innerText)">${r.stage||''}</td><td class="p-4" contenteditable="true" onblur="window.updateTimelineCellData(${i},'pa',this.innerText)">${r.pa||''}</td><td class="p-4" contenteditable="true" onblur="window.updateTimelineCellData(${i},'notes',this.innerText)">${r.notes||''}</td><td class="p-4" contenteditable="true" onblur="window.updateTimelineCellData(${i},'audio',this.innerText)">${r.audio||''}</td><td class="p-4" contenteditable="true" onblur="window.updateTimelineCellData(${i},'video',this.innerText)">${r.video||''}</td><td><button onclick="window.deleteTimelineRow(${i})">❌</button></td></tr>`).join(''); }
        window.renderChecklist = function() { const box = document.getElementById('checklist-box'); if(!box) return; box.innerHTML = (window.appData.checklist||[]).map((it,i)=>`<div class="flex p-4 gap-4"><input type="checkbox" ${it.done?'checked':''} onchange="window.toggleCheckItem(${i})"><div contenteditable="true" onblur="window.updateCheckItemText(${i},this.innerText)">${it.item||''}</div><button onclick="window.deleteCheckItem(${i})">❌</button></div>`).join(''); }
        window.renderVenueTablesGrid = function() { const grid = document.getElementById('venue-tables-grid'); if(!grid||!window.appData.tablesConfig) return; let h=""; for(let i=1;i<=(window.appData.tablesConfig.totalTables||40);i++){ h+=`<button onclick="window.cloudUpdateCell('selectedTable',${i})" class="h-16 rounded-2xl bg-white border">${i}</button>`; } grid.innerHTML=h; }
        window.renderTeamModules = function(d, tid) { const g = document.getElementById('team-modules-grid'); if(!g) return; g.innerHTML = (d.modules||[]).map((m,i)=>`<div class="bg-white border p-4 rounded-xl"><h4 class="font-bold" contenteditable="true" onblur="window.updateModuleCell('${tid}',${i},'title',this.innerText)">${m.title||'新任務'}</h4><div contenteditable="true" onblur="window.updateModuleCell('${tid}',${i},'content',this.innerText)">${m.content||''}</div><button onclick="window.deleteModuleFromTeam('${tid}',${i})">刪除</button></div>`).join(''); }
        window.updateTableBoxVegLightOnly = function() {}; window.calculateKitchenRadar = function() {};
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const app = initializeApp({ apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM", authDomain: "test-fee8d.firebaseapp.com", projectId: "test-fee8d", databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        window.cloudDb = db;
        window.cloudUpdateCell = function(path, value) { set(ref(window.cloudDb, `ts_2026_realtime_data/${path}`), value); };
        window.cloudDeleteNode = function(path) { remove(ref(window.cloudDb, `ts_2026_realtime_data/${path}`)); };
        window.checkAuthAndRun = function() {
            let savedKey = localStorage.getItem('ts_auth_key'); let savedUser = localStorage.getItem('ts_auth_user');
            if (savedKey !== "ts2026" || !savedUser) { document.getElementById('auth-overlay').classList.remove('hidden'); return false; }
            document.getElementById('display-user-name').innerText = `👤 指揮官：${savedUser}`; return true;
        }
        window.submitAuth = function() {
            const k = document.getElementById('input-auth-key').value.trim(); const u = document.getElementById('input-auth-user').value.trim();
            if (k !== "ts2026" || !u) { alert("暗號錯誤！"); return; }
            localStorage.setItem('ts_auth_key', k); localStorage.setItem('ts_auth_user', u); window.location.reload();
        }
        if (window.checkAuthAndRun()) {
            onValue(ref(db, 'ts_2026_realtime_data'), (s) => { window.appData = s.val(); if(window.appData) { window.renderSidebarMenu(); window.renderActivePanelOnly(); } });
        }
    </script>
</body>
</html>
