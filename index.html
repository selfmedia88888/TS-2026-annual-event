<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜最終修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-panel { display: none; }
        .main-panel.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <div id="auth-overlay" class="fixed inset-0 bg-[#052659]/90 z-[9999] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
            <h2 class="text-center font-bold">身份核驗</h2>
            <input type="password" id="input-auth-key" placeholder="密碼" class="w-full bg-slate-50 border rounded-xl p-3">
            <input type="text" id="input-auth-user" placeholder="名稱" class="w-full bg-slate-50 border rounded-xl p-3">
            <button onclick="window.submitAuth()" class="w-full bg-[#5483B3] text-white py-3 rounded-xl">登錄</button>
        </div>
    </div>

    <div class="flex flex-1 flex-col lg:flex-row">
        <aside id="sidebar-menu" class="w-64 bg-white border-r p-4"></aside>
        <main id="main-content" class="p-8"><div id="panel-timeline" class="main-panel"></div><div id="panel-seating" class="main-panel"></div><div id="panel-checklist" class="main-panel"></div><div id="panel-team-generic" class="main-panel"></div></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. 初始化設定
        const firebaseConfig = { apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM", authDomain: "test-fee8d.firebaseapp.com", projectId: "test-fee8d", databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.cloudDb = db;
        
        // 2. 函數定義區 (全部放在這裡，確保不會有找不到的問題)
        window.cloudUpdateCell = (path, val) => set(ref(db, `ts_2026_realtime_data/${path}`), val);
        window.cloudDeleteNode = (path) => remove(ref(db, `ts_2026_realtime_data/${path}`));
        
        window.renderSidebarMenu = () => { /* 這裡放你原本的 Sidebar 邏輯 */ };
        window.renderActivePanelOnly = () => { /* 這裡放你原本的渲染邏輯 */ };
        window.updateTableBoxVegLightOnly = () => { /* 這裡補上那個缺少的函數 */ };
        window.calculateKitchenRadar = () => { /* 這裡補上那個缺少的函數 */ };
        window.renderTimelineTable = () => { /* 補上 */ };
        window.renderChecklist = () => { /* 補上 */ };
        window.renderVenueTablesGrid = () => { /* 補上 */ };
        window.renderTeamModules = (d, tid) => { /* 補上 */ };
        window.adjustTotalTables = (v) => { window.cloudUpdateCell("tablesConfig/totalTables", parseInt(v)); };

        // 3. 驗證與啟動
        window.submitAuth = () => {
            if(document.getElementById('input-auth-key').value === "ts2026") {
                localStorage.setItem('ts_auth_key', "ts2026");
                localStorage.setItem('ts_auth_user', document.getElementById('input-auth-user').value);
                window.location.reload();
            }
        };

        if(localStorage.getItem('ts_auth_key') === "ts2026") {
            onValue(ref(db, 'ts_2026_realtime_data'), (s) => {
                window.appData = s.val();
                if(window.appData) {
                    window.renderSidebarMenu(); 
                    window.renderActivePanelOnly();
                }
            });
        } else {
            document.getElementById('auth-overlay').classList.remove('hidden');
        }
    </script>
</body>
</html>
