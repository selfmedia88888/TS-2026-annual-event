<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜總導播智慧主控中樞</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        /* 嚴格導入組長專屬色碼系統（清新藍白調優化版） */
        :root {
            --color-bg: #F8FAFC;        /* 清新藍灰底 */
            --color-card: #FFFFFF;      /* 純白卡片 */
            --color-navy: #021024;      /* 深邃夜藍 (深色字用) */
            --color-darkblue: #052659;  /* 內斂暗藍 (主標題用) */
            --color-primary: #5483B3;   /* 核心鋼鐵藍 */
            --color-muted: #7DA0CA;     /* 柔和迷霧藍 */
            --color-light: #C1E8FF;     /* 耀眼冰藍 */
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--color-bg);
            color: #1e293b;
        }

        /* 拖拽時的視覺特效 */
        .dragging {
            opacity: 0.5;
            background-color: #f1f5f9 !important;
            border: 2px dashed var(--color-primary) !important;
        }
        
        /* 美化滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-primary);
            border-radius: 4px;
        }

        /* 讓可編輯欄位更有回饋感 */
        [contenteditable="true"]:focus {
            outline: 2px solid var(--color-primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(84, 131, 179, 0.15);
            border-radius: 6px;
            padding: 2px;
        }

        .card-shadow {
            box-shadow: 0 4px 18px -4px rgba(5, 38, 89, 0.05), 0 2px 6px -1px rgba(5, 38, 89, 0.03);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <header class="border-b border-slate-200 bg-white/90 backdrop-blur-md sticky top-0 z-50 px-8 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-gradient-to-tr from-[#5483B3] to-[#C1E8FF] rounded-xl flex items-center justify-center shadow-md shadow-[#5483B3]/20">
                <svg viewBox="0 0 24 24" class="w-7 h-7 text-white fill-current" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2,12C2,12 5,3 12,3C16,3 22,6 22,12C22,15 18,20 12,20C8,20 5,17 4,15C5.5,15.5 7.5,15 9,14C6,13 4.5,10.5 4.5,8.5C5.5,9.5 7,10 8,9.5C5,8 4.5,5 5.5,4C6.5,6.5 9,9 13,9.5C12,8 12.5,6 14,4.5C16,3 18.5,4 19.5,5.5C18.5,5 17,5 16,5.5C17,6.5 17.5,8 17,9.5C18.5,9 20,7.5 20.5,6.5C20,8.5 18.5,10 17,11C19,11 20.5,10.5 21,10C20.5,12 18.5,13.5 16.5,14C18,15.5 19,17.5 18.5,19.5C16,18 14,15.5 13,14C10,15 6,15 2,12Z"/>
                </svg>
            </div>
            <div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold tracking-widest bg-[#5483B3]/10 text-[#5483B3] border border-[#5483B3]/20 px-1.5 py-0.5 rounded">2026 TS MASTER</span>
                </div>
                <h1 class="text-base font-bold tracking-tight text-[#052659]">年度盛會｜大會智慧決策中樞</h1>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="exportAllData()" class="bg-white hover:bg-slate-50 text-[#5483B3] text-xs px-4 py-2 rounded-xl border border-slate-200 transition-all flex items-center gap-1.5 shadow-sm">
                <i class="fa-solid fa-cloud-arrow-down"></i> 備份導出
            </button>
            <span class="text-xs text-emerald-600 bg-emerald-50 border border-emerald-100 px-3 py-2 rounded-full flex items-center gap-1.5 font-medium">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 實時同步中
            </span>
        </div>
    </header>

    <div class="flex flex-1">
        <aside class="w-64 border-r border-slate-200 bg-white p-4 flex flex-col justify-between select-none">
            <div class="flex flex-col gap-1" id="sidebar-menu">
                <p class="text-[11px] font-bold uppercase tracking-wider text-slate-400 px-3 mb-2">大會指揮官面版</p>
                </div>
            
            <div class="pt-4 border-t border-slate-100 mt-4 flex flex-col gap-2">
                <button onclick="createNewPanelPrompt()" class="w-full bg-[#5483B3] hover:bg-[#5483B3]/90 text-white text-xs font-medium py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-sm shadow-blue-100">
                    <i class="fa-solid fa-folder-plus"></i> ＋ 新增主控分組
                </button>
                <div class="p-3 rounded-xl bg-slate-50 border border-slate-100 text-[11px] text-slate-500 leading-relaxed">
                    <i class="fa-solid fa-circle-info text-[#5483B3]"></i> 提示：時程表的左側按鈕 <i class="fa-solid fa-grip-lines"></i> 可直接「滑鼠拖曳」重排先後順序。
                </div>
            </div>
        </aside>

        <main class="flex-1 p-8 bg-[#F8FAFC] overflow-y-auto">
            
            <div id="panel-timeline" class="main-panel hidden">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-xl font-bold tracking-tight text-[#052659] flex items-center gap-2">
                            <i class="fa-solid fa-list-timeline text-[#5483B3]"></i> 大會核心時程大骨架
                        </h2>
                        <p class="text-xs text-slate-500 mt-1">此處為大會總進度表，包含器材、音控與攝影等全新串接防線。</p>
                    </div>
                    <button onclick="addNewTimelineRow()" class="bg-[#5483B3] hover:bg-[#5483B3]/90 text-white text-xs font-semibold px-4 py-2.5 rounded-xl transition-all flex items-center gap-1.5 shadow-sm shadow-blue-100">
                        <i class="fa-solid fa-plus"></i> 新增時段
                    </button>
                </div>

                <div class="bg-white border border-slate-200 rounded-2xl overflow-x-auto card-shadow">
                    <table class="w-full text-left border-collapse min-w-[1300px]">
                        <thead>
                            <tr class="bg-slate-50/70 border-b border-slate-200 text-xs font-semibold uppercase tracking-wider text-slate-500">
                                <th class="p-4 w-12 text-center">排</th>
                                <th class="p-4 w-32">時間段</th>
                                <th class="p-4 w-44">核心節目模組</th>
                                <th class="p-4 w-64">內容與舞台設定 (T台運用)</th>
                                <th class="p-4 w-48">器材清單</th>
                                <th class="p-4 w-44">PA / 音控 CUE</th>
                                <th class="p-4 w-44">攝影與 Photocall</th>
                                <th class="p-4 w-44">備註</th>
                                <th class="p-4 w-16 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="timeline-drag-tbody" class="divide-y divide-slate-100 text-xs">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="panel-checklist" class="main-panel hidden">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-xl font-bold text-[#052659] flex items-center gap-2">
                            <i class="fa-solid fa-shield-heart text-[#5483B3]"></i> 大會物資與安全防線守護
                        </h2>
                    </div>
                    <button onclick="addNewChecklistItem()" class="bg-[#5483B3] text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-sm">＋ 新增物資項目</button>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl divide-y divide-slate-100 card-shadow" id="checklist-box">
                    </div>
            </div>

            <div id="panel-team-generic" class="main-panel hidden">
                <div class="border-b border-slate-200 pb-6 mb-6 flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-3">
                            <h2 class="text-xl font-bold text-[#052659]" id="team-title-display">專屬小組盤</h2>
                            <span class="text-xs bg-slate-100 text-[#5483B3] px-2.5 py-0.5 rounded-full border border-slate-200 font-medium">協作防線組</span>
                        </div>
                        <p class="text-xs text-slate-500 mt-2">點擊文字可直接新增或修改組員，並利用下方區塊規劃本組專屬工作任務。</p>
                    </div>
                    <button onclick="deleteCurrentCustomPanel()" id="btn-delete-panel" class="bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 text-xs px-3 py-1.5 rounded-xl transition-all">
                        <i class="fa-solid fa-trash-can"></i> 刪除此組別
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1">
                        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm card-shadow">
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-500 flex items-center gap-1.5 mb-3">
                                <i class="fa-solid fa-user-gear text-[#5483B3]"></i> 本組作戰組員 (直接點擊修改)
                            </label>
                            <div id="team-members-box" contenteditable="true" onblur="saveCurrentTeamMembers(this.innerText)" class="bg-slate-50 text-slate-700 text-xs border border-slate-200 rounded-xl p-4 min-h-[120px] focus:outline-none leading-relaxed">
                                暫無組員資訊，點擊此處直接新增編輯。
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xs font-bold uppercase text-slate-500 tracking-wider flex items-center gap-1.5">
                                <i class="fa-solid fa-cubes text-[#5483B3]"></i> 本組專屬功能戰術模塊
                            </h3>
                            <button onclick="addNewModuleToTeam()" class="bg-white hover:bg-slate-50 text-[#5483B3] border border-slate-200 text-xs px-3 py-1.5 rounded-xl transition-all shadow-sm">
                                <i class="fa-solid fa-square-plus text-[#5483B3]"></i> ＋ 新增專屬模塊
                            </button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="team-modules-grid">
                            </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const fallbackTimeline = [
            { time: "09:00 - 12:00", module: "前置與彩排", stage: "硬體測試、大螢幕簡報、抽獎畫面。彩排重點：主持人與長官走位、T台燈光。", equip: "無線麥克風*4、簡報筆*2", pa: "播放開場音樂、測試燈光", photo: "主要攝影、Photocall點位確認", note: "工作人員8點半到" },
            { time: "12:00 - 13:00", module: "港風沉浸進場", stage: "開放外場拍照區、背景港風 BGM 播放。400人依座位入座。", equip: "拍照背板、指示牌", pa: "經典港片組曲", photo: "外場拍照背板區抓拍", note: "動線組防止拍照回堵" },
            { time: "13:00 - 13:30", module: "盛大開場秀", stage: "T 台全面啟用！燈光音效全開。核心籌備團隊與長官港風走秀進場。", equip: "走秀道具、墨鏡", pa: "震撼開場大片與音效", photo: "T台正前方主位攝影", note: "舞台執行組引導順序" },
            { time: "13:30 - 14:00", module: "🎯 遊戲接口 A", stage: "全場就座，主持人宣讀今年港風大賽總規則。預留發放籌碼時間。", equip: "初始卡牌、規則手冊", pa: "背景賭神音樂低音量", photo: "捕捉台下驚訝與互動神情", note: "控制在30分鐘內" },
            { time: "14:00 - 16:00", module: "第一章：榮耀表揚", stage: "全場專注力最高峰。長官致詞、表揚頒獎。T台作為榮耀大道，燈光聚焦金黃色。", equip: "獎盃、托盤、證書", pa: "頒獎大氣激勵音樂", photo: "受獎者特寫與大合照", note: "得獎感言嚴控超時" },
            { time: "16:00 - 17:30", module: "🎯 遊戲接口 B", stage: "全場解封！進入高互動大逃殺環節（400人社交猜拳搶星星）。", equip: "星星貼紙、計分板、大球*3", pa: "大逃殺緊張倒數音樂", photo: "全景空拍、桌間移動抓拍", note: "動線組全員下去維護安全" },
            { time: "17:30 - 18:30", module: "中場沉澱與熱舞", stage: "眾人回座，公布決賽名單。首席熱舞炸場，無縫轉入晚宴氣氛。", equip: "舞者表演道具", pa: "熱舞高強拍節奏音樂", photo: "舞台動態錄影", note: "行政組通知餐廳備菜" },
            { time: "18:30 - 19:30", module: "圓桌晚宴 (前段)", stage: "40桌同時用餐，播放港風爵士。大會主控群與長官進行第一輪逐桌敬酒。", equip: "主控席酒水", pa: "舒服港風爵士樂", photo: "逐桌用餐溫馨花絮", note: "動線組開路嚴防卡關" },
            { time: "19:30 - 20:15", module: "🎯 遊戲接口 C", stage: "晚宴高潮：巔峰決戰（賭神爭霸）。決賽選手登上架高 T 台，40桌觀戰下注。", equip: "決賽桌椅、撲克牌道具", pa: "賭神決戰命懸一線音效", photo: "T台決戰主螢幕轉播", note: "舞台組提早搬運道具" },
            { time: "20:15 - 21:15", module: "第四章：星海排字", stage: "全場感性最高峰。現場燈光瞬間全關（Blackout）。400人開啟手機燈光高空空拍。", equip: "空拍機、應援物", pa: "溫暖、團魂凝聚墊樂", photo: "全場黑燈大高空俯拍", note: "音控組死守全黑燈點" },
            { time: "21:15 - 22:30", module: "終章：傳承大合照", stage: "核心精神傳承儀式、時光膠囊封箱。400人依桌號分批有序登上 T 台進行大合照。", equip: "時光膠囊寶盒、合照階梯", pa: "溫馨傳承合唱音樂", photo: "400人梯次分批大合照", note: "安全第一，控管T台承重" },
            { time: "22:30 - 23:00", module: "平安賦歸與撤場", stage: "播放溫馨散場音樂。工作人員清點一廊宴會廳大會物資，撤場。", equip: "清點清單", pa: "散場抒情音樂", photo: "工作人員大合照", note: "Owen 主導清點撤場" }
        ];

        const fallbackChecklist = [
            { id: 1, done: true, item: "架高 T 台安全與邊緣承重檢查", team: "活動組", note: "彩排時死守邊緣，防止踩空" },
            { id: 2, done: false, item: "黑幫默示錄初始卡牌道具到位", team: "遊戲組", note: "12:00 前必須送到簽到處配合報到" },
            { id: 3, done: false, item: "抽獎大螢幕視訊字卡聯動測試", team: "設計組", note: "機票與 iPad Pro 抽獎特效走位確認" },
            { id: 4, done: true, item: "40 箱啤酒與後場冰塊對接", team: "行政組", note: "冰塊指定 17:50 抵達宴會廳後場" },
            { id: 5, done: false, item: "頒獎典禮送花動線安全規範", team: "活動組", note: "禁止送花夥伴在頒獎時爬上 T 台阻擋空拍" }
        ];

        const defaultPanels = [
            { id: "timeline", name: "大會主骨架細流", icon: "fa-clock-history", type: "system" },
            { id: "checklist", name: "物資與防線檢核", icon: "fa-list-check", type: "system" },
            { id: "team_activity", name: "活動組工作盤", icon: "fa-users-gear", type: "team", members: "Owen (組長), 執行A (舞台), 執行B (音控), 執行C (動線)", modules: [{title: "四大執行防線", content: "包含舞台控制(Floor Manager)、視訊音控組、場內動線引導、主持控時組。"}] },
            { id: "team_admin", name: "行政組工作盤", icon: "fa-folder-open", type: "team", members: "恩安 (組長), 夥伴群", modules: [{title: "報到簽到與桌次", content: "控管 400 人圓桌分配、吃素名單與餐廳出菜進度。"}] },
            { id: "team_marketing", name: "行銷組工作盤", icon: "fa-bullhorn", type: "team", members: "待招募核心夥伴", modules: [{title: "社群曝光排程", content: "年會倒數視覺、當天精采瞬间即時返圖與宣傳文案。"}] },
            { id: "team_design", name: "設計組工作盤", icon: "fa-palette", type: "team", members: "宇哲 (組長)", modules: [{title: "製作物規格追蹤", content: "主背板視覺輸出、手牌、獎狀托盤與抽獎動態畫面。"}] },
            { id: "team_game", name: "遊戲組工作盤", icon: "fa-dice", type: "team", members: "柏任 (組長)", modules: [{title: "賭博默示錄規則", content: "負責規劃400人大逃殺、籌碼發放比例與晚宴T台巔峰決戰機制。"}] }
        ];

        let appData = {
            timeline: JSON.parse(localStorage.getItem('ts_v3_timeline')) || fallbackTimeline,
            checklist: JSON.parse(localStorage.getItem('ts_v3_checklist')) || fallbackChecklist,
            panels: JSON.parse(localStorage.getItem('ts_v3_panels')) || defaultPanels,
            currentTab: localStorage.getItem('ts_v3_current_tab') || "timeline"
        };

        function saveData() {
            localStorage.setItem('ts_v3_timeline', JSON.stringify(appData.timeline));
            localStorage.setItem('ts_v3_checklist', JSON.stringify(appData.checklist));
            localStorage.setItem('ts_v3_panels', JSON.stringify(appData.panels));
            localStorage.setItem('ts_v3_current_tab', appData.currentTab);
        }

        // 渲染左側選單
        function renderSidebarMenu() {
            const menu = document.getElementById('sidebar-menu');
            menu.innerHTML = `<p class="text-[11px] font-bold uppercase tracking-wider text-slate-400 px-3 mb-2">大會指揮官面版</p>`;
            
            appData.panels.forEach(p => {
                const isActive = appData.currentTab === p.id;
                let activeStyle = isActive 
                    ? `bg-[#5483B3]/10 text-[#5483B3] border-[#5483B3]/30 font-bold shadow-sm` 
                    : `text-slate-500 hover:bg-slate-50 hover:text-slate-800 border-transparent`;
                
                menu.innerHTML += `
                    <button onclick="switchTab('${p.id}')" class="w-full text-left px-4 py-2.5 rounded-xl border text-xs transition-all flex items-center justify-between group ${activeStyle}">
                        <div class="flex items-center gap-2.5">
                            <i class="fa-solid ${p.icon} w-4 text-center ${isActive ? 'text-[#5483B3]' : 'text-slate-400' }"></i>
                            <span>${p.name}</span>
                        </div>
                        ${p.type === 'team' && !isActive ? '<span class="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-400 group-hover:bg-[#5483B3]/10 group-hover:text-[#5483B3]">組</span>' : ''}
                    </button>
                `;
            });
        }

        // 分頁切換器
        function switchTab(tabId) {
            appData.currentTab = tabId;
            saveData();
            renderSidebarMenu();
            
            document.querySelectorAll('.main-panel').forEach(p => p.classList.add('hidden'));
            
            if(tabId === 'timeline') {
                document.getElementById('panel-timeline').classList.remove('hidden');
                renderTimelineTable();
            } else if(tabId === 'checklist') {
                document.getElementById('panel-checklist').classList.remove('hidden');
                renderChecklist();
            } else {
                const panelData = appData.panels.find(p => p.id === tabId);
                if(panelData) {
                    const genericPanel = document.getElementById('panel-team-generic');
                    genericPanel.classList.remove('hidden');
                    document.getElementById('team-title-display').innerText = panelData.name;
                    document.getElementById('team-members-box').innerText = panelData.members || "點擊此處輸入名單...";
                    
                    const systemGroupIds = ['team_activity', 'team_admin', 'team_marketing', 'team_design', 'team_game'];
                    if(systemGroupIds.includes(panelData.id)) {
                        document.getElementById('btn-delete-panel').classList.add('hidden');
                    } else {
                        document.getElementById('btn-delete-panel').classList.remove('hidden');
                    }

                    renderTeamModules(panelData);
                }
            }
        }

        // --- 功能 1 & 2：時程表拖拉與多功能欄位 ---
        function renderTimelineTable() {
            const tbody = document.getElementById('timeline-drag-tbody');
            tbody.innerHTML = appData.timeline.map((row, idx) => `
                <tr class="hover:bg-slate-50/60 transition-all" draggable="true" ondragstart="handleDragStart(event, ${idx})" ondragover="handleDragOver(event)" ondrop="handleDrop(event, ${idx})" ondragend="handleDragEnd(event)">
                    <td class="p-4 text-center cursor-grab text-slate-300 hover:text-[#5483B3] text-sm"><i class="fa-solid fa-grip-lines"></i></td>
                    <td class="p-4 font-mono font-bold text-[#5483B3]" contenteditable="true" onblur="updateTimelineCell(${idx}, 'time', this.innerText)">${row.time}</td>
                    <td class="p-4 font-bold text-slate-800" contenteditable="true" onblur="updateTimelineCell(${idx}, 'module', this.innerText)">${row.module}</td>
                    <td class="p-4 text-slate-600 leading-relaxed" contenteditable="true" onblur="updateTimelineCell(${idx}, 'stage', this.innerText)">${row.stage}</td>
                    <td class="p-4 text-slate-600" contenteditable="true" onblur="updateTimelineCell(${idx}, 'equip', this.innerText)">${row.equip || ''}</td>
                    <td class="p-4 text-[#5483B3] font-medium" contenteditable="true" onblur="updateTimelineCell(${idx}, 'pa', this.innerText)">${row.pa || ''}</td>
                    <td class="p-4 text-slate-600" contenteditable="true" onblur="updateTimelineCell(${idx}, 'photo', this.innerText)">${row.photo || ''}</td>
                    <td class="p-4 text-slate-400 italic" contenteditable="true" onblur="updateTimelineCell(${idx}, 'note', this.innerText)">${row.note || ''}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteTimelineRow(${idx})" class="text-slate-300 hover:text-rose-500 transition-colors p-1"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        let dragStartIndex = null;
        function handleDragStart(e, index) {
            dragStartIndex = index;
            e.currentTarget.classList.add('dragging');
        }
        function handleDragOver(e) {
            e.preventDefault();
        }
        function handleDrop(e, index) {
            e.preventDefault();
            if(dragStartIndex === null || dragStartIndex === index) return;
            const draggedItem = appData.timeline.splice(dragStartIndex, 1)[0];
            appData.timeline.splice(index, 0, draggedItem);
            saveData();
            renderTimelineTable();
        }
        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
        }

        function updateTimelineCell(index, field, value) {
            appData.timeline[index][field] = value;
            saveData();
        }

        function addNewTimelineRow() {
            appData.timeline.push({ time: "18:00 - 18:30", module: "新項目模組", stage: "主舞台 / T台動線設定...", equip: "", pa: "", photo: "", note: "" });
            saveData();
            renderTimelineTable();
        }

        function deleteTimelineRow(index) {
            if(confirm("確定要刪除這段時間排程嗎？")) {
                appData.timeline.splice(index, 1);
                saveData();
                renderTimelineTable();
            }
        }

        // --- 功能 3：手動自訂分組 ---
        function createNewPanelPrompt() {
            const name = prompt("請輸入全新協作組別的名稱（例如：公關組、財務組）：");
            if(!name) return;
            const id = "team_" + Date.now();
            appData.panels.push({
                id: id,
                name: name + "工作盤",
                icon: "fa-users-rectangle",
                type: "team",
                members: "組長與組員名單...",
                modules: [{ title: "初始任務指標", content: "點擊文字直接修改任務清單..." }]
            });
            saveData();
            switchTab(id);
        }

        function deleteCurrentCustomPanel() {
            if(confirm("確定要徹底刪除此小組的所有板塊與名單嗎？")) {
                appData.panels = appData.panels.filter(p => p.id !== appData.currentTab);
                appData.currentTab = "timeline";
                saveData();
                switchTab("timeline");
            }
        }

        // --- 功能 4：編輯組員與戰術子模塊 ---
        function saveCurrentTeamMembers(text) {
            const panel = appData.panels.find(p => p.id === appData.currentTab);
            if(panel) {
                panel.members = text;
                saveData();
            }
        }

        function renderTeamModules(panel) {
            const grid = document.getElementById('team-modules-grid');
            if(!panel.modules) panel.modules = [];
            
            grid.innerHTML = panel.modules.map((mod, mIdx) => `
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm relative group card-shadow">
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="text-xs font-bold text-[#052659]" contenteditable="true" onblur="updateModuleData(${mIdx}, 'title', this.innerText)">${mod.title}</h4>
                        <button onclick="deleteModuleFromTeam(${mIdx})" class="text-rose-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs"><i class="fa-solid fa-square-minus"></i> 刪除</button>
                    </div>
                    <div class="text-xs text-slate-500 leading-relaxed bg-slate-50 border border-slate-100 p-3 rounded-lg focus:outline-none min-h-[60px]" contenteditable="true" onblur="updateModuleData(${mIdx}, 'content', this.innerText)">${mod.content}</div>
                </div>
            `).join('');
        }

        function updateModuleData(mIdx, field, value) {
            const panel = appData.panels.find(p => p.id === appData.currentTab);
            if(panel && panel.modules[mIdx]) {
                panel.modules[mIdx][field] = value;
                saveData();
            }
        }

        function addNewModuleToTeam() {
            const panel = appData.panels.find(p => p.id === appData.currentTab);
            if(panel) {
                if(!panel.modules) panel.modules = [];
                panel.modules.push({ title: "新工作模塊", content: "在此輸入具體工作細節..." });
                saveData();
                renderTeamModules(panel);
            }
        }

        function deleteModuleFromTeam(mIdx) {
            const panel = appData.panels.find(p => p.id === appData.currentTab);
            if(panel && panel.modules) {
                panel.modules.splice(mIdx, 1);
                saveData();
                renderTeamModules(panel);
            }
        }

        // --- 物資檢核清單 (CHECKLIST) ---
        function renderChecklist() {
            const box = document.getElementById('checklist-box');
            box.innerHTML = appData.checklist.map((item, idx) => `
                <div class="grid grid-cols-12 p-4 items-center gap-3 ${item.done ? 'bg-slate-50/60 opacity-50' : ''}">
                    <div class="col-span-1 text-center">
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleCheckItem(${idx})" class="w-4 h-4 rounded border-slate-300 text-[#5483B3] focus:ring-0">
                    </div>
                    <div class="col-span-3 text-xs font-bold text-slate-800 ${item.done ? 'line-through text-slate-400' : ''}" contenteditable="true" onblur="updateCheckCell(${idx}, 'item', this.innerText)">${item.item}</div>
                    <div class="col-span-2 text-xs"><span class="bg-blue-50/60 text-[#5483B3] px-2.5 py-1 rounded-md border border-[#5483B3]/20" contenteditable="true" onblur="updateCheckCell(${idx}, 'team', this.innerText)">${item.team}</span></div>
                    <div class="col-span-5 text-xs text-slate-500" contenteditable="true" onblur="updateCheckCell(${idx}, 'note', this.innerText)">${item.note}</div>
                    <div class="col-span-1 text-center">
                        <button onclick="deleteCheckItem(${idx})" class="text-slate-300 hover:text-rose-500 transition-colors text-xs"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCheckItem(idx) {
            appData.checklist[idx].done = !appData.checklist[idx].done;
            saveData();
            renderChecklist();
        }

        function updateCheckCell(idx, field, val) {
            appData.checklist[idx][field] = val;
            saveData();
        }

        function addNewChecklistItem() {
            appData.checklist.push({ id: Date.now(), done: false, item: "全新防線物資", team: "主控組", note: "修改備註..." });
            saveData();
            renderChecklist();
        }

        function deleteCheckItem(idx) {
            appData.checklist.splice(idx, 1);
            saveData();
            renderChecklist();
        }

        // 導出 JSON 數據
        function exportAllData() {
            const blob = new Blob([JSON.stringify(appData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "2026_TS_年度盛會_全功能清新藍指揮官配置檔.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // 初始化驅動
        document.addEventListener("DOMContentLoaded", () => {
            switchTab(appData.currentTab);
        });
    </script>
</body>
</html>
