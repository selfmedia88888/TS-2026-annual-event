<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜指揮中樞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-panel { display: none; }
        .main-panel.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="content" class="p-6">載入中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        // 鎖定這個路徑，這是你 Firebase 裡面所有資料的根目錄
        const dataRef = ref(db, 'ts_2026_realtime_data');

        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.appData = data;
                console.log("資料庫已成功同步，內容為：", data);
                // 這裡會觸發你原本寫好的 renderSidebarMenu() 和 renderActivePanelOnly()
                // 為了確保你的 UI 能動，我建議你直接呼叫你原本寫好的渲染函數：
                if(window.renderSidebarMenu) window.renderSidebarMenu();
                if(window.renderActivePanelOnly) window.renderActivePanelOnly();
                document.getElementById('content').innerHTML = "系統已載入完畢，請點選選單。";
            }
        });
    </script>
</body>
</html>
