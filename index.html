        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // 這一行是直接讀取資料庫最原始的 ts_2026_realtime_data

        onValue(dataRef, (snapshot) => {

            console.log("資料庫撈取原始資料:", data);
            
            // 這裡直接檢查是否有原本的 team_activity 等欄位
            if (data) {
                // 如果你看到控制台輸出這些資料，代表字都在！

                alert("系統已連線，請檢查瀏覽器控制台 (F12) 查看所有歷史文字！");
            }
        });
    </script>
</body>
