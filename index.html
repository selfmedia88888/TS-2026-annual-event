<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>TS 2026 最終資料還原版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div id="content" class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-2xl font-bold text-blue-900">正在緊急撈取所有原始資料...</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'ts_2026_realtime_data');

        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            const content = document.getElementById('content');
            content.innerHTML = '<h1 class="text-2xl font-bold mb-4">資料救援顯示區</h1>';

            if (data) {
                // 暴力讀取所有資料
                for (let key in data) {
                    // 如果是 team_ 開頭或者在 panels 裡面的，全部顯示出來
                    if (key.includes('team_') || key === 'panels') {
                        renderPanel(key, data[key]);
                    }
                }
            }
        });

        function renderPanel(key, p) {
            const content = document.getElementById('content');
            let items = Array.isArray(p) ? p : [p]; // 處理陣列或單一物件
            
            items.forEach(item => {
                if (!item || typeof item !== 'object') return;
                
                let html = `
                    <div class="bg-white p-6 rounded-xl shadow-lg border-l-8 border-green-500 mb-6">
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">${item.name || key}</h2>
                        <p class="text-gray-600 mb-4">組員: ${item.members || '無內容'}</p>
                        <div class="space-y-3">`;
                
                if (item.modules) {
                    const modules = Array.isArray(item.modules) ? item.modules : Object.values(item.modules);
                    modules.forEach(m => {
                        html += `
                            <div class="bg-gray-50 p-4 rounded border">
                                <h3 class="font-bold text-blue-700">${m.title || '任務'}</h3>
                                <p class="text-gray-700 text-sm whitespace-pre-wrap">${m.content || ''}</p>
                            </div>`;
                    });
                }
                html += `</div></div>`;
                content.innerHTML += html;
            });
        }
    </script>
</body>
</html>
