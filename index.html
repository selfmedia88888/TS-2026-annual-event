<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>TS 2026 指揮中樞｜最終定案版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <div id="app" class="max-w-3xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold text-blue-900">TS 2026 年度盛會指揮中樞</h1>
        <div id="content" class="space-y-6">讀取中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'ts_2026_realtime_data/panels');

        onValue(dataRef, (snapshot) => {
            const panels = snapshot.val();
            const content = document.getElementById('content');
            content.innerHTML = "";

            if (panels && Array.isArray(panels)) {
                panels.forEach((p) => {
                    if (!p) return; // 略過無效項目
                    
                    let html = `
                        <div class="bg-white p-6 rounded-xl shadow-lg border border-blue-100">
                            <h2 class="text-2xl font-bold text-blue-900 border-b pb-2 mb-4">${p.name || '未命名分頁'}</h2>
                            <p class="text-sm font-bold text-gray-500 mb-2">👤 組員名單:</p>
                            <div class="bg-gray-50 p-3 rounded-lg mb-4 text-gray-800">${p.members || '無'}</div>
                            <div class="space-y-3">
                                <p class="text-sm font-bold text-gray-500">📦 任務模塊:</p>`;
                    
                    if (p.modules && Array.isArray(p.modules)) {
                        p.modules.forEach(m => {
                            html += `
                                <div class="bg-white p-3 rounded border border-gray-200">
                                    <h3 class="font-bold text-blue-700">${m.title || '任務'}</h3>
                                    <p class="text-gray-700 text-sm mt-1 whitespace-pre-wrap">${m.content || ''}</p>
                                </div>`;
                        });
                    }
                    html += `</div></div>`;
                    content.innerHTML += html;
                });
            } else {
                content.innerHTML = '<p class="text-red-500">無法讀取面板資料，請檢查資料庫結構。</p>';
            }
        });
    </script>
</body>
</html>
