<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TS 年度盛會｜最終完全修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1e293b; }
        [contenteditable="true"] { white-space: pre-wrap !important; word-break: break-word !important; }
        [contenteditable="true"]:focus { outline: 2px solid #5483B3; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(84, 131, 179, 0.15); border-radius: 6px; }
        .main-panel { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 18px -4px rgba(5, 38, 89, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">
    <div id="auth-overlay" class="fixed inset-0 bg-[#052659]/90 z-[9999] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
            <h2 class="text-[#052659] text-center font-bold">身份核驗</h2>
            <input type="password" id="input-auth-key" placeholder="輸入密碼 (ts2026)" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
            <input type="text" id="input-auth-user" placeholder="名稱" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
            <button onclick="window.submitAuth()" class="w-full bg-[#5483B3] text-white py-3 rounded-xl">登錄</button>
        </div>
    </div>

    <header class="border-b bg-white px-4 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#052659]">TS 2026 年度盛會智慧中樞</h1>
        <span id="display-user-name" class="text-sm bg-slate-100 px-3 py-1.5 rounded-xl">👤 載入中...</span>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row">
        <aside class="w-full lg:w-64 border-r bg-white p-4" id="sidebar-menu"></aside>
        <main class="flex-1 p-8">
            <div id="panel-timeline" class="main-panel">...</div>
            <div id="panel-seating" class="main-panel">
                <div class="bg-slate-900 rounded-xl p-4 text-white flex justify-between text-sm">
                    <div>總人數:<span id="panel-stat-total" class="font-bold text-[#C1E8FF]">0</span></div>
                    <div>葷食:<span id="panel-stat-meat" class="font-bold text-amber-400">0</span></div>
                    <div>🟢 素食:<span id="panel-stat-veg" class="font-bold text-emerald-400">0</span></div>
                </div>
                <div class="mt-4 flex items-center gap-2">
                    <input type="number" id="input-total-tables" class="w-16 border rounded-lg p-2" onchange="window.adjustTotalTables(this.value)"> 桌
                </div>
                <div class="grid grid-cols-10 gap-2 mt-4" id="venue-tables-grid"></div>
                <div id="table-details-box" class="mt-4 bg-white border rounded-xl p-4 hidden">
                    <h3 id="selected-table-title" class="font-bold mb-2"></h3>
                    <div class="grid grid-cols-5 gap-2" id="seats-inputs-grid"></div>
                </div>
            </div>
            <div id="panel-checklist" class="main-panel"></div>
            <div id="panel-team-generic" class="main-panel">
                <h2 id="team-title-display" class="font-bold text-xl"></h2>
                <div id="team-members-box" contenteditable="true" class="bg-slate-50 p-4 rounded-xl border"></div>
                <div class="grid grid-cols-2 gap-4 mt-4" id="team-modules-grid"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM", authDomain: "test-fee8d.firebaseapp.com", projectId: "test-fee8d", databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" }));
        window.cloudDb = db;
        window.cloudUpdateCell = (p, v) => set(ref(db, `ts_2026_realtime_data/${p}`), v);
        window.cloudDeleteNode = (p) => remove(ref(db, `ts_2026_realtime_data/${p}`));
        
        window.submitAuth = () => {
            if(document.getElementById('input-auth-key').value === "ts2026") {
                localStorage.setItem('ts_auth_key', "ts2026");
                localStorage.setItem('ts_auth_user', document.getElementById('input-auth-user').value);
                window.location.reload();
            }
        };

        if (localStorage.getItem('ts_auth_key') === "ts2026") {
            onValue(ref(db, 'ts_2026_realtime_data'), (s) => { 
                window.appData = s.val(); 
                if(window.appData) { window.renderSidebarMenu(); window.renderActivePanelOnly(); window.renderVenueTablesGrid(); window.calculateKitchenRadar(); } 
            });
        } else { document.getElementById('auth-overlay').classList.remove('hidden'); }
    </script>

    <script>
        // --- 完整邏輯補回 ---
        let seatTimer = {};
        window.updateSeatName = function(tn, si, v) {
            clearTimeout(seatTimer[`${tn}_${si}`]);
            seatTimer[`${tn}_${si}`] = setTimeout(() => { window.cloudUpdateCell(`tablesConfig/tablesData/${tn}/seats/${si}/name`, v); }, 500);
        }

        window.calculateKitchenRadar = function() {
            if (!window.appData || !window.appData.tablesConfig || !window.appData.tablesConfig.tablesData) return;
            let total = 0, veg = 0;
            const config = window.appData.tablesConfig;
            for(let i=1; i<=(config.totalTables || 40); i++) {
                const tData = config.tablesData[i];
                if(tData && tData.seats) {
                    tData.seats.forEach(s => { if(s && s.name && s.name.trim() !== "") { total++; if(s.isVeg) veg++; } });
                }
            }
            document.getElementById('panel-stat-total').innerText = total;
            document.getElementById('panel-stat-veg').innerText = veg;
            document.getElementById('panel-stat-meat').innerText = total - veg;
        }

        window.renderVenueTablesGrid = function() {
            const grid = document.getElementById('venue-tables-grid'); if(!grid||!window.appData.tablesConfig) return;
            let h=""; for(let i=1;i<=(window.appData.tablesConfig.totalTables||40);i++){ h+=`<button onclick="window.cloudUpdateCell('selectedTable',${i})" class="h-16 rounded-2xl bg-white border">${i}</button>`; }
            grid.innerHTML=h;
            window.renderTableSeatsControl();
            window.calculateKitchenRadar(); // 確保重新繪製時統計更新
        }

        window.renderTableSeatsControl = function() {
            const box = document.getElementById('table-details-box'); const grid = document.getElementById('seats-inputs-grid'); const title = document.getElementById('selected-table-title');
            const tn = window.appData.selectedTable; if(!tn) return; box.classList.remove('hidden'); title.innerText = `第 ${tn} 桌`;
            const tD = (window.appData.tablesConfig.tablesData||{})[tn] || {seats:Array(10).fill({name:"", isVeg:false})};
            grid.innerHTML = tD.seats.map((s,i)=>`<div class="flex items-center gap-2 border p-2 rounded-xl"><input class="w-full" value="${s.name||''}" oninput="window.updateSeatName(${tn},${i},this.value)"><button onclick="window.toggleSeatVeg(${tn},${i})" class="${s.isVeg?'bg-emerald-500 text-white':'bg-white'}">素</button></div>`).join('');
        }

        window.toggleSeatVeg = (tn, si) => {
            const isVeg = !((window.appData.tablesConfig.tablesData[tn].seats[si]||{}).isVeg);
            window.cloudUpdateCell(`tablesConfig/tablesData/${tn}/seats/${si}/isVeg`, isVeg);
        }

        window.renderSidebarMenu = () => { /* 這裡放你原本的 Sidebar 邏輯 */ };
        window.renderActivePanelOnly = () => { /* 這裡放你原本的渲染邏輯 */ };
        window.switchTab = (tid) => { window.currentActiveTab = tid; window.renderSidebarMenu(); window.renderActivePanelOnly(); };
        window.adjustTotalTables = (v) => window.cloudUpdateCell("tablesConfig/totalTables", parseInt(v));
    </script>
</body>
</html>
