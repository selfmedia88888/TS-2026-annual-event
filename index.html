    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🎯 已完美嵌入組長專屬的雲端密鑰
        const firebaseConfig = {
            apiKey: "AIzaSyBQdnW16U1OxpDR05hvAv2fcZ4aMKXsyfM",
            authDomain: "test-fee8d.firebaseapp.com",
            projectId: "test-fee8d",
            storageBucket: "test-fee8d.firebasestorage.app",
            messagingSenderId: "415299571304",
            appId: "1:415299571304:web:391ce6ecb4d8e2f19035dd",
            measurementId: "G-EL7VKT97L4",
            databaseURL: "https://test-fee8d-default-rtdb.firebaseio.com" 
            // 💡 備註：若您當初 Realtime Database 地區選亞洲(新加坡)，請將上面這行網址改為：
            // https://test-fee8d-default-rtdb.asia-southeast1.firebasedatabase.app
        };

        // 初始化雲端神經網絡
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'ts_2026_realtime_data');

        // 監聽雲端大腦：任何夥伴修改內容，全台所有人的電腦/手機不需要重新整理，畫面會實時秒更！
        onValue(dataRef, (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                window.appData = cloudData;
                window.refreshActivePanel();
            } else {
                window.saveData(); // 初次無資料時初始化
            }
        });

        // 實時推播同步至雲端資料庫
        window.saveData = function() {
            set(dataRef, window.appData);
        }
    </script>

            { time: "22:30 - 23:00", module: "平安賦歸與撤場", stage: "播放溫馨散場音樂。工作人員清點一廊宴會廳大會物資，撤場。", equip: "清點清單", pa: "散場抒情音樂", photo: "工作人員大合照", note: "Owen 主導清點撤場" }
        ];

        const fallbackChecklist = [
            { id: 1, done: true, item: "架高 T 台安全與邊緣承重檢查", team: "活動組", note: "彩排時死守邊緣，防止踩空" },
            { id: 2, done: false, item: "黑幫默示錄初始卡牌道具到位", team: "遊戲組", note: "12:00 前必須送到簽到處配合報到" }
        ];

            { id: "timeline", name: "大會主細流", icon: "fa-clock-history", type: "system" },
            { id: "checklist", name: "物資防線檢核", icon: "fa-list-check", type: "system" },
            { id: "team_activity", name: "活動組工作盤", icon: "fa-users-gear", type: "team", members: "Owen (組長), 夥伴群", modules: [{title: "四大執行防線", content: "負責控管舞台執行、視訊音控、場內引導、主持控時。"}] },

            { id: "team_game", name: "遊戲組工作盤", icon: "fa-dice", type: "team", members: "柏任 (組長)", modules: [{title: "賭博默示錄規則機制", content: "負責設計三個遊戲接口的初始籌碼配比與決賽大道具。"}] },
            { id: "team_mkt", name: "行銷組工作盤", icon: "fa-bullhorn", type: "team", members: "待招募夥伴", modules: [{title: "行銷排程", content: "年會社群宣傳、當天精采花絮即時發文。"}] }
        ];

        window.appData = {
            timeline: fallbackTimeline,
            checklist: fallbackChecklist,
            panels: defaultPanels,
            currentTab: "timeline"
        };

        // 綁定全域調度引擎
        window.refreshActivePanel = function() {
            renderSidebarMenu();
            switchTab(window.appData.currentTab || "timeline");
        }

        window.renderSidebarMenu = function() {
            const menu = document.getElementById('sidebar-menu');
            menu.innerHTML = `<p class="hidden lg:block text-[11px] font-bold uppercase tracking-wider text-slate-400 px-3 mb-2">大會總指揮面版</p>`;
            window.appData.panels.forEach(p => {
                const isActive = window.appData.currentTab === p.id;
                let activeStyle = isActive ? `bg-[#5483B3]/10 text-[#5483B3] border-[#5483B3]/30 font-bold shadow-sm shrink-0 lg:shrink` : `text-slate-500 hover:bg-slate-50 border-transparent shrink-0 lg:shrink`;
                menu.innerHTML += `<button onclick="switchTab('${p.id}')" class="text-left px-4 py-2.5 rounded-xl border text-xs transition-all flex items-center gap-2 ${activeStyle}"><i class="fa-solid ${p.icon} w-4 text-center"></i><span class="whitespace-nowrap">${p.name}</span></button>`;
            });
        }

        window.switchTab = function(tabId) {
            window.appData.currentTab = tabId;
            document.querySelectorAll('.main-panel').forEach(p => p.classList.add('hidden'));
            
            if(tabId === 'timeline') {
                document.getElementById('panel-timeline').classList.remove('hidden');
                renderTimelineTable();
            } else if(tabId === 'checklist') {
                document.getElementById('panel-checklist').classList.remove('hidden');
                renderChecklist();
            } else {
                const panelData = window.appData.panels.find(p => p.id === tabId);
                if(panelData) {
                    document.getElementById('panel-team-generic').classList.remove('hidden');
                    document.getElementById('team-title-display').innerText = panelData.name;
                    document.getElementById('team-members-box').innerText = panelData.members || "點擊輸入組員...";
                    const sysIds = ['team_activity', 'team_admin', 'team_design', 'team_game', 'team_mkt'];
                    document.getElementById('btn-delete-panel').style.display = sysIds.includes(panelData.id) ? 'none' : 'block';
                    renderTeamModules(panelData);
                }
            }
            localStorage.setItem('ts_v3_current_tab', tabId);
        }

        window.renderTimelineTable = function() {
            const desktopTbody = document.getElementById('timeline-desktop-tbody');
            desktopTbody.innerHTML = window.appData.timeline.map((row, idx) => `
                <tr class="hover:bg-slate-50 transition-all" draggable="true" ondragstart="handleDragStart(event, ${idx})" ondragover="handleDragOver(event)" ondrop="handleDrop(event, ${idx})" ondragend="handleDragEnd(event)">
                    <td class="p-4 text-center cursor-grab text-slate-300 hover:text-[#5483B3] text-sm"><i class="fa-solid fa-grip-lines"></i></td>
                    <td class="p-4 font-mono font-bold text-[#5483B3]" contenteditable="true" onblur="updateTimelineCell(${idx}, 'time', this.innerText)">${row.time}</td>
                    <td class="p-4 font-bold text-slate-800" contenteditable="true" onblur="updateTimelineCell(${idx}, 'module', this.innerText)">${row.module}</td>
                    <td class="p-4 text-slate-600 leading-relaxed" contenteditable="true" onblur="updateTimelineCell(${idx}, 'stage', this.innerText)">${row.stage}</td>
                    <td class="p-4 text-slate-600" contenteditable="true" onblur="updateTimelineCell(${idx}, 'equip', this.innerText)">${row.equip || ''}</td>
                    <td class="p-4 text-[#5483B3] font-medium" contenteditable="true" onblur="updateTimelineCell(${idx}, 'pa', this.innerText)">${row.pa || ''}</td>
                    <td class="p-4 text-slate-600" contenteditable="true" onblur="updateTimelineCell(${idx}, 'photo', this.innerText)">${row.photo || ''}</td>
                    <td class="p-4 text-slate-400 italic" contenteditable="true" onblur="updateTimelineCell(${idx}, 'note', this.innerText)">${row.note || ''}</td>
                    <td class="p-4 text-center"><button onclick="deleteTimelineRow(${idx})" class="text-slate-300 hover:text-rose-500 p-1"><i class="fa-solid fa-trash-can"></i></button></td>
                </tr>
            `).join('');

            const mobileContainer = document.getElementById('timeline-mobile-container');
            mobileContainer.innerHTML = window.appData.timeline.map((row, idx) => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm space-y-3">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-2">
                        <div>
                            <span class="text-xs font-mono font-bold text-[#5483B3] block" contenteditable="true" onblur="updateTimelineCell(${idx}, 'time', this.innerText)">${row.time}</span>
                            <h3 class="text-sm font-bold text-slate-800 mt-0.5" contenteditable="true" onblur="updateTimelineCell(${idx}, 'module', this.innerText)">${row.module}</h3>
                        </div>
                        <button onclick="deleteTimelineRow(${idx})" class="text-slate-300 hover:text-rose-500 text-xs"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="text-xs text-slate-600">
                        <span class="font-bold text-slate-400 block text-[10px] uppercase tracking-wider mb-1">🎬 內容與動線設定：</span>
                        <p class="focus:bg-slate-50 p-1 rounded" contenteditable="true" onblur="updateTimelineCell(${idx}, 'stage', this.innerText)">${row.stage}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-50 text-[11px]">
                        <div class="bg-slate-50 p-2 rounded-xl">
                            <span class="font-bold text-slate-400 block text-[9px] uppercase mb-0.5">🛠 器材清單：</span>
                            <span class="text-slate-700 block min-h-[15px]" contenteditable="true" onblur="updateTimelineCell(${idx}, 'equip', this.innerText)">${row.equip || ''}</span>
                        </div>
                        <div class="bg-blue-50/60 p-2 rounded-xl">
                            <span class="font-bold text-[#5483B3] block text-[9px] uppercase mb-0.5">🎵 PA / 音控：</span>
                            <span class="text-[#5483B3] font-medium block min-h-[15px]" contenteditable="true" onblur="updateTimelineCell(${idx}, 'pa', this.innerText)">${row.pa || ''}</span>
                        </div>
                    </div>
                    <div class="text-[11px] text-slate-700 bg-slate-50 p-2 rounded-xl">
                        <span class="font-bold text-slate-400 block text-[9px] uppercase mb-0.5">📸 攝影畫面：</span>
                        <span class="block min-h-[15px]" contenteditable="true" onblur="updateTimelineCell(${idx}, 'photo', this.innerText)">${row.photo || ''}</span>
                    </div>
                    <div class="text-[11px] text-slate-400 italic pt-1" contenteditable="true" onblur="updateTimelineCell(${idx}, 'note', this.innerText)">📝 備註：${row.note || ''}</div>
                </div>
            `).join('');
        }

        let dragStartIndex = null;
        window.handleDragStart = function(e, index) { dragStartIndex = index; e.currentTarget.classList.add('dragging'); }
        window.handleDragOver = function(e) { e.preventDefault(); }
        window.handleDrop = function(e, index) {
            e.preventDefault();
            if(dragStartIndex === null || dragStartIndex === index) return;
            const draggedItem = window.appData.timeline.splice(dragStartIndex, 1)[0];
            window.appData.timeline.splice(index, 0, draggedItem);
            window.saveData();
            renderTimelineTable();
        }
        window.handleDragEnd = function(e) { e.currentTarget.classList.remove('dragging'); }

        window.updateTimelineCell = function(index, field, value) { window.appData.timeline[index][field] = value; window.saveData(); }
        window.addNewTimelineRow = function() { window.appData.timeline.push({ time: "時段設定", module: "新項目模組", stage: "編輯橋段設定...", equip: "", pa: "", photo: "", note: "" }); window.saveData(); renderTimelineTable(); }
        window.deleteTimelineRow = function(index) { if(confirm("確定刪除此段時程？")) { window.appData.timeline.splice(index, 1); window.saveData(); renderTimelineTable(); } }

        window.saveCurrentTeamMembers = function(text) {
            const panel = window.appData.panels.find(p => p.id === window.appData.currentTab);
            if(panel) { panel.members = text; window.saveData(); }
        }
        window.renderTeamModules = function(panel) {
            const grid = document.getElementById('team-modules-grid');
            if(!panel.modules) panel.modules = [];
            grid.innerHTML = panel.modules.map((mod, mIdx) => `
                <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm group">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="text-xs font-bold text-[#052659]" contenteditable="true" onblur="updateModuleData(${mIdx}, 'title', this.innerText)">${mod.title}</h4>
                        <button onclick="deleteModuleFromTeam(${mIdx})" class="text-rose-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs"><i class="fa-solid fa-minus"></i></button>
                    </div>
                    <div class="text-xs text-slate-500 leading-relaxed bg-slate-50 p-2 rounded-lg min-h-[50px]" contenteditable="true" onblur="updateModuleData(${mIdx}, 'content', this.innerText)">${mod.content}</div>
                </div>
            `).join('');
        }
        window.updateModuleData = function(mIdx, field, value) {
            const panel = window.appData.panels.find(p => p.id === window.appData.currentTab);
            if(panel) { panel.modules[mIdx][field] = value; window.saveData(); }
        }
        window.addNewModuleToTeam = function() {
            const panel = window.appData.panels.find(p => p.id === window.appData.currentTab);
            if(panel) { panel.modules.push({ title: "全新功能塊", content: "點擊編輯內容細節..." }); window.saveData(); renderTeamModules(panel); }
        }
        window.deleteModuleFromTeam = function(mIdx) {
            const panel = window.appData.panels.find(p => p.id === window.appData.currentTab);
            if(panel) { panel.modules.splice(mIdx, 1); window.saveData(); renderTeamModules(panel); }
        }
        window.createNewPanelPrompt = function() {
            const name = prompt("請輸入全新協作組別名稱："); if(!name) return;
            const id = "team_" + Date.now();
            window.appData.panels.push({ id, name: name+"工作盤", icon: "fa-users-rectangle", type: "team", members: "編輯組員...", modules: [{ title: "主控任務指標", content: "編輯內容..." }] });
            window.saveData(); switchTab(id);
        }
        window.deleteCurrentCustomPanel = function() {
            if(confirm("確定刪除此分組？")) { window.appData.panels = window.appData.panels.filter(p => p.id !== window.appData.currentTab); window.appData.currentTab = "timeline"; window.saveData(); switchTab("timeline"); }
        }

        window.renderChecklist = function() {
            const box = document.getElementById('checklist-box');
            box.innerHTML = window.appData.checklist.map((item, idx) => `
                <div class="flex items-center p-4 gap-4 ${item.done ? 'bg-slate-50 opacity-50' : ''}">
                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleCheckItem(${idx})" class="w-4 h-4 rounded border-slate-300 text-[#5483B3] focus:ring-0">
                    <div class="flex-1 text-xs font-bold text-slate-800 ${item.done ? 'line-through text-slate-400' : ''}" contenteditable="true" onblur="updateCheckCell(${idx}, 'item', this.innerText)">${item.item}</div>
                    <span class="bg-blue-50 text-[#5483B3] text-[10px] px-2 py-0.5 rounded border border-[#5483B3]/20" contenteditable="true" onblur="updateCheckCell(${idx}, 'team', this.innerText)">${item.team}</span>
                    <div class="flex-1 text-xs text-slate-400 hidden sm:block" contenteditable="true" onblur="updateCheckCell(${idx}, 'note', this.innerText)">${item.note}</div>
                    <button onclick="deleteCheckItem(${idx})" class="text-slate-300 hover:text-rose-400 text-xs"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }
        window.toggleCheckItem = function(idx) { window.appData.checklist[idx].done = !window.appData.checklist[idx].done; window.saveData(); renderChecklist(); }
        window.updateCheckCell = function(idx, field, val) { window.appData.checklist[idx][field] = val; window.saveData(); }
        window.addNewChecklistItem = function() { window.appData.checklist.push({ id: Date.now(), done: false, item: "新防線項目", team: "主控組", note: "點擊修改..." }); window.saveData(); renderChecklist(); }
        window.deleteCheckItem = function(idx) { window.appData.checklist.splice(idx, 1); window.saveData(); renderChecklist(); }

        window.exportAllData = function() {
            const blob = new Blob([JSON.stringify(window.appData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "2026_TS_年度盛會_智慧中樞實時版.json"; a.click();
        }
    </script>
</body>
</html>
